      const [classNum, setClassNum] = useState(1);
      const [studentNum, setStudentNum] = useState(1);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');

        setError('');

        try {
          // 학생이 처음이면 등록, 이미 있으면 그대로
          const { data: existing } = await supabase
            .from('students')
            .select('*')
            .eq('id', studentId)
            .maybeSingle();

          if (!existing) {
            const { error: insertError } = await supabase
              .from('students')
              .insert({ id: studentId, grade, class_num: classNum, student_num: studentNum });
            if (insertError) throw insertError;
          }

          onLogin(studentId);
        } catch (err) {
          setError('연결에 실패했어요. 인터넷을 확인해주세요.');
          console.error(err);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-50 to-emerald-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-3xl shadow-xl max-w-md w-full p-8 slide-up">

              </div>

              <p className="text-sm text-slate-500">학년, 반, 번호를 선택해주세요</p>
            </div>

            <div className="space-y-4 mb-6">
              <div>
                <label className="text-xs font-semibold text-slate-600 mb-2 block">학년</label>
                <div className="grid grid-cols-4 gap-2">
                  {[3, 4, 5, 6].map(g => (
                    <button key={g} onClick={() => setGrade(g)} className={`py-3 rounded-xl font-bold transition-all ${grade === g ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-700 hover:bg-slate-200'}`}>

                  </div>
                  <button onClick={() => setClassNum(Math.min(20, classNum + 1))} className="w-12 h-12 rounded-xl bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Plus className="w-5 h-5" /></button>

    // ===========================================================
    // 퀴즈 모달
    // ===========================================================
    function QuizModal({ lesson, studentId, onClose, onComplete }) {
      const [currentQ, setCurrentQ] = useState(0);
      const [selected, setSelected] = useState(null);
      const [results, setResults] = useState([]);
      const [showResult, setShowResult] = useState(false);

      if (!lesson || !lesson.quiz || lesson.quiz.length === 0) return null;
      const totalQ = lesson.quiz.length;

      const handleAnswer = async () => {
        if (selected === null) return;
        const q = lesson.quiz[currentQ];
        const isCorrect = selected === q.answer;
        const newResults = [...results, isCorrect];

        // 퀴즈 결과를 Supabase에 저장
        try {
          await supabase.from('quiz_results').insert({
            student_id: studentId,
            lesson_id: lesson.id,
            question_idx: currentQ,
            is_correct: isCorrect
          });
        } catch (err) { console.error('퀴즈 결과 저장 실패:', err); }

        if (currentQ + 1 < totalQ) {
          setResults(newResults);
          setCurrentQ(currentQ + 1);
          setSelected(null);
        } else {
          setResults(newResults);
          setShowResult(true);
        }
      };

      const handleRetry = () => {
        setCurrentQ(0);
        setSelected(null);
        setResults([]);
        setShowResult(false);
      };

      const handleClose = () => {
        if (showResult) {
          const correctCount = results.filter(r => r).length;
          const passed = correctCount === totalQ;
          onComplete(lesson.id, passed);
        }
        onClose();
      };

      if (showResult) {
        const correctCount = results.filter(r => r).length;
        const passed = correctCount === totalQ;

        return (
          <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
            <div className="bg-white rounded-2xl max-w-md w-full p-6 slide-up max-h-[90vh] overflow-y-auto">
              <div className="text-center mb-5">
                {passed ? (<>
                  <div className="w-16 h-16 bg-emerald-500 rounded-full mx-auto mb-3 flex items-center justify-center"><Trophy className="w-8 h-8 text-white" /></div>
                  <h3 className="text-xl font-bold text-slate-900 mb-1">완벽해요!</h3>
                  <p className="text-sm text-slate-600">{totalQ}문제 모두 맞혔어요. 다음 차시로 가도 좋아요</p>
                </>) : (<>
                  <div className="w-16 h-16 bg-amber-500 rounded-full mx-auto mb-3 flex items-center justify-center"><RefreshCw className="w-8 h-8 text-white" /></div>
                  <h3 className="text-xl font-bold text-slate-900 mb-1">조금 더 익혀볼까요?</h3>
                  <p className="text-sm text-slate-600">{totalQ}문제 중 {correctCount}문제 맞혔어요</p>
                </>)}
              </div>
              <div className="space-y-2 mb-5">
                {lesson.quiz.map((q, idx) => (
                  <div key={idx} className={`p-3 rounded-lg border ${results[idx] ? 'bg-emerald-50 border-emerald-200' : 'bg-rose-50 border-rose-200'}`}>
                    <div className="flex items-start gap-2">
                      {results[idx] ? <Check className="w-4 h-4 text-emerald-600 mt-0.5 flex-shrink-0" /> : <X className="w-4 h-4 text-rose-600 mt-0.5 flex-shrink-0" />}
                      <div className="flex-1 min-w-0">
                        <p className="text-sm font-medium text-slate-900 mb-1">{idx + 1}. {q.q}</p>
                        {!results[idx] && <p className="text-xs text-slate-600">정답: <span className="font-semibold">{q.options[q.answer]}</span> · {q.explain}</p>}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
              <div className="flex gap-2">
                <button onClick={handleRetry} className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-2.5 rounded-lg text-sm">다시 풀기</button>
                <button onClick={handleClose} className="flex-1 bg-slate-900 hover:bg-slate-800 text-white font-semibold py-2.5 rounded-lg text-sm">닫기</button>
              </div>
            </div>
          </div>
        );
      }

      const q = lesson.quiz[currentQ];
      return (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
          <div className="bg-white rounded-2xl max-w-md w-full p-6 slide-up">
            <div className="flex items-center justify-between mb-4">
              <div className="flex items-center gap-2"><CheckCircle className="w-5 h-5 text-blue-600" /><h3 className="font-bold text-slate-900">자기 점검 퀴즈</h3></div>
              <button onClick={onClose} className="w-8 h-8 rounded-lg bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><X className="w-4 h-4 text-slate-600" /></button>
            </div>
            <div className="flex items-center gap-1.5 mb-5">{lesson.quiz.map((_, idx) => (<div key={idx} className={`h-1.5 flex-1 rounded-full ${idx < currentQ ? 'bg-emerald-500' : idx === currentQ ? 'bg-blue-500' : 'bg-slate-200'}`} />))}</div>
            <p className="text-xs font-semibold text-slate-500 mb-1">문제 {currentQ + 1} / {totalQ}</p>
            <p className="text-base font-medium text-slate-900 mb-5 leading-relaxed">{q.q}</p>
            <div className="space-y-2 mb-5">
              {q.options.map((opt, idx) => (
                <button key={idx} onClick={() => setSelected(idx)} className={`w-full text-left p-3 rounded-lg border-2 transition-all ${selected === idx ? 'border-blue-500 bg-blue-50' : 'border-slate-200 hover:border-slate-400'}`}>
                  <div className="flex items-center gap-3">
                    <div className={`w-6 h-6 rounded-full border-2 flex-shrink-0 flex items-center justify-center ${selected === idx ? 'border-blue-500 bg-blue-500' : 'border-slate-300'}`}>{selected === idx && <div className="w-2 h-2 bg-white rounded-full" />}</div>
                    <span className="text-sm font-medium text-slate-800">{opt}</span>
                  </div>
                </button>
              ))}
            </div>
            <button onClick={handleAnswer} disabled={selected === null} className={`w-full py-3 rounded-lg font-semibold text-sm transition-all ${selected !== null ? 'bg-slate-900 hover:bg-slate-800 text-white' : 'bg-slate-100 text-slate-400 cursor-not-allowed'}`}>
              {currentQ + 1 < totalQ ? '다음 문제' : '결과 확인'}
            </button>
          </div>
        </div>
      );
    }

    // ===========================================================
    // 메인 앱
    // ===========================================================
    function NProtocol() {
      const [studentId, setStudentId] = useState(null);  // 로그인된 학생 ID
      const [mode, setMode] = useState('student');
      const [view, setView] = useState('home');
      const [currentLesson, setCurrentLesson] = useState(null);
      const [showCallModal, setShowCallModal] = useState(false);
      const [callStatus, setCallStatus] = useState(null);
      const [showQuiz, setShowQuiz] = useState(false);
      const [progress, setProgress] = useState({});
      const [calls, setCalls] = useState([]);

      // 학생 진도 불러오기
      useEffect(() => {
        if (!studentId || studentId === 'TEACHER') return;
        const loadProgress = async () => {
          const { data } = await supabase.from('progress').select('*').eq('student_id', studentId);
          if (data) {
            const map = {};
            data.forEach(row => {
              map[row.lesson_id] = { visited: row.visited, quizPassed: row.quiz_passed };
            });
            setProgress(map);
          }
        };
        loadProgress();
      }, [studentId]);

      // 호출 데이터 불러오기 + 실시간 구독 (교사 모드)
      useEffect(() => {
        if (studentId !== 'TEACHER' && mode !== 'teacher') return;
        const loadCalls = async () => {
          const { data } = await supabase.from('calls').select('*').order('created_at', { ascending: false }).limit(50);
          if (data) setCalls(data);
        };
        loadCalls();

        // 실시간 구독
        const channel = supabase
          .channel('calls-changes')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'calls' }, () => {
            loadCalls();
          })
          .subscribe();

        return () => { supabase.removeChannel(channel); };
      }, [studentId, mode]);

      const prerequisiteData = {
        title: "분수 단원을 시작하기 전에",
        subtitle: "이 3가지만 알면 충분히 따라갈 수 있어요",
        concepts: [
          { id: 1, name: "똑같이 나누기", from: "3학년 1학기", description: "분수는 '똑같이 나눈다'는 생각에서 시작해요. 사과 한 개를 두 사람이 똑같이 나눠 먹으려면 어떻게 해야 할까요?", keyPoint: "똑같이 = 모양과 크기가 같게", manipulative: 'equal-share' },
          { id: 2, name: "곱셈구구", from: "2학년", description: "분수의 크기를 비교하거나 표기할 때 곱셈구구를 알면 훨씬 편해요.", keyPoint: "2단, 3단, 4단, 5단은 자동으로 떠올릴 수 있어야 해요", manipulative: null },
          { id: 3, name: "전체와 부분", from: "2학년", description: "한 묶음 전체에서 그 일부를 보는 사고가 분수의 핵심이에요.", keyPoint: "전체를 보고, 그 안에서 부분을 찾을 수 있어야 해요", manipulative: null }
        ]

      const lessons = [

        const [total, setTotal] = useState(12);
        const [denominator, setDenominator] = useState(3);
        const [numerator, setNumerator] = useState(1);
        const groupSize = Math.floor(total / denominator);
        const result = groupSize * numerator;
        const isValid = total % denominator === 0;
        return (
          <div className="space-y-4">
            <div className="bg-white rounded-xl p-5">
              <p className="text-xs font-semibold text-slate-600 mb-3">사탕 {total}개의 {numerator}/{denominator}는?</p>
              {isValid ? (<>
                <div className="flex flex-wrap gap-1.5 justify-center mb-3">
                  {Array.from({ length: total }, (_, i) => { const groupIdx = Math.floor(i / groupSize); const isInResult = groupIdx < numerator; return (<div key={i} className={`w-7 h-7 rounded-full ${isInResult ? 'bg-emerald-500' : 'bg-slate-200'} ${(i + 1) % groupSize === 0 ? 'mr-2' : ''} transition-colors`} />); })}
                </div>
                <p className="text-center text-sm text-slate-700">{total} ÷ {denominator} = {groupSize}개씩 묶음<br /><span className="font-bold text-slate-900">{numerator}묶음 = </span><span className="font-bold text-emerald-600 text-lg">{result}개</span></p>
              </>) : (<p className="text-center text-sm text-amber-700 py-4">{total}을 {denominator}로 나눌 수 없어요.<br />다른 수를 골라보세요.</p>)}
            </div>
            <div className="bg-white rounded-xl p-4 space-y-3">
              <div><label className="text-xs font-semibold text-slate-600 mb-1.5 block">전체 개수</label><div className="flex items-center gap-3"><button onClick={() => setTotal(Math.max(2, total - 1))} className="w-9 h-9 rounded-lg bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Minus className="w-4 h-4" /></button><span className="font-bold text-lg w-10 text-center">{total}</span><button onClick={() => setTotal(Math.min(20, total + 1))} className="w-9 h-9 rounded-lg bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Plus className="w-4 h-4" /></button></div></div>
              <div><label className="text-xs font-semibold text-slate-600 mb-1.5 block">분모 ({denominator}묶음으로 나누기)</label><div className="flex items-center gap-3"><button onClick={() => { const v = Math.max(2, denominator - 1); setDenominator(v); if (numerator > v) setNumerator(v); }} className="w-9 h-9 rounded-lg bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Minus className="w-4 h-4" /></button><span className="font-bold text-lg w-10 text-center">{denominator}</span><button onClick={() => setDenominator(Math.min(6, denominator + 1))} className="w-9 h-9 rounded-lg bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Plus className="w-4 h-4" /></button></div></div>
              <div><label className="text-xs font-semibold text-slate-600 mb-1.5 block">분자 (몇 묶음 가져올까?)</label><div className="flex items-center gap-3"><button onClick={() => setNumerator(Math.max(1, numerator - 1))} className="w-9 h-9 rounded-lg bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Minus className="w-4 h-4" /></button><span className="font-bold text-lg w-10 text-center">{numerator}</span><button onClick={() => setNumerator(Math.min(denominator, numerator + 1))} className="w-9 h-9 rounded-lg bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Plus className="w-4 h-4" /></button></div></div>
            </div>
          </div>
        );
      };

      const ReverseFraction = () => {
        const [total, setTotal] = useState(12);
        const [groupSize, setGroupSize] = useState(4);
        const [selected, setSelected] = useState(1);
        const groups = Math.floor(total / groupSize);
        const isValid = total % groupSize === 0;
        return (
          <div className="space-y-4">
            <div className="bg-white rounded-xl p-5">
              <p className="text-xs font-semibold text-slate-600 mb-3">{total}개를 {groupSize}개씩 묶으면?</p>
              {isValid ? (<>
                <div className="flex flex-wrap gap-1.5 justify-center mb-3">
                  {Array.from({ length: total }, (_, i) => { const groupIdx = Math.floor(i / groupSize); const isSelected = groupIdx < selected; return (<div key={i} className={`w-7 h-7 rounded-full ${isSelected ? 'bg-emerald-500' : 'bg-slate-200'} ${(i + 1) % groupSize === 0 ? 'mr-2' : ''} transition-colors cursor-pointer`} onClick={() => setSelected(groupIdx + 1)} />); })}
                </div>
                <p className="text-center text-sm text-slate-700">{groups}묶음 중 <span className="font-bold text-emerald-600">{selected}묶음</span> 선택<br /><span className="font-bold text-slate-900">전체의 </span><span className="font-bold text-emerald-600 text-lg">{selected}/{groups}</span></p>
              </>) : (<p className="text-center text-sm text-amber-700 py-4">{total}을 {groupSize}로 나눌 수 없어요.</p>)}
            </div>
            <div className="bg-white rounded-xl p-4 space-y-3">
              <div><label className="text-xs font-semibold text-slate-600 mb-1.5 block">전체 개수</label><div className="flex items-center gap-3"><button onClick={() => setTotal(Math.max(2, total - 1))} className="w-9 h-9 rounded-lg bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Minus className="w-4 h-4" /></button><span className="font-bold text-lg w-10 text-center">{total}</span><button onClick={() => setTotal(Math.min(20, total + 1))} className="w-9 h-9 rounded-lg bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Plus className="w-4 h-4" /></button></div></div>
              <div><label className="text-xs font-semibold text-slate-600 mb-1.5 block">한 묶음에 몇 개씩?</label><div className="flex items-center gap-3"><button onClick={() => setGroupSize(Math.max(1, groupSize - 1))} className="w-9 h-9 rounded-lg bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Minus className="w-4 h-4" /></button><span className="font-bold text-lg w-10 text-center">{groupSize}</span><button onClick={() => setGroupSize(Math.min(10, groupSize + 1))} className="w-9 h-9 rounded-lg bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Plus className="w-4 h-4" /></button></div></div>
              <p className="text-xs text-slate-500">사탕을 클릭해서 묶음을 골라보세요</p>
            </div>
          </div>
        );
      };

      const ProperImproper = () => {
        const [denominator, setDenominator] = useState(3);
        const [numerator, setNumerator] = useState(2);
        const isProper = numerator < denominator;
        const isEqual = numerator === denominator;
        const wholes = Math.floor(numerator / denominator);
        const remainder = numerator % denominator;
        return (
          <div className="space-y-4">
            <div className="bg-white rounded-xl p-5">
              <div className="space-y-2 mb-4">
                {Array.from({ length: Math.max(1, wholes + (remainder > 0 ? 1 : 0)) }, (_, rowIdx) => { const isLastRow = rowIdx === wholes && remainder > 0; const filledInRow = isLastRow ? remainder : (rowIdx < wholes ? denominator : 0); return (<div key={rowIdx} className="flex gap-0.5">{Array.from({ length: denominator }, (_, i) => (<div key={i} className={`flex-1 h-8 border border-slate-400 rounded ${i < filledInRow ? 'bg-emerald-500' : 'bg-slate-100'}`} />))}</div>); })}
              </div>
              <div className="text-center mb-3"><div className="inline-flex flex-col items-center"><div className="text-2xl font-bold text-slate-900">{numerator}</div><div className="h-0.5 w-6 bg-slate-900"></div><div className="text-2xl font-bold text-slate-900">{denominator}</div></div></div>
              <div className={`text-center py-2 px-4 rounded-lg ${isProper ? 'bg-blue-50 text-blue-700' : 'bg-amber-50 text-amber-700'}`}><p className="text-sm font-semibold">{isProper ? '진분수 (1보다 작음)' : isEqual ? '가분수 (1과 같음)' : '가분수 (1보다 큼)'}</p></div>
            </div>
            <div className="bg-white rounded-xl p-4 space-y-3">
              <div><label className="text-xs font-semibold text-slate-600 mb-1.5 block">분모</label><div className="flex items-center gap-3"><button onClick={() => setDenominator(Math.max(2, denominator - 1))} className="w-9 h-9 rounded-lg bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Minus className="w-4 h-4" /></button><span className="font-bold text-lg w-10 text-center">{denominator}</span><button onClick={() => setDenominator(Math.min(8, denominator + 1))} className="w-9 h-9 rounded-lg bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Plus className="w-4 h-4" /></button></div></div>
              <div><label className="text-xs font-semibold text-slate-600 mb-1.5 block">분자</label><div className="flex items-center gap-3"><button onClick={() => setNumerator(Math.max(1, numerator - 1))} className="w-9 h-9 rounded-lg bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Minus className="w-4 h-4" /></button><span className="font-bold text-lg w-10 text-center">{numerator}</span><button onClick={() => setNumerator(Math.min(denominator * 3, numerator + 1))} className="w-9 h-9 rounded-lg bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Plus className="w-4 h-4" /></button></div></div>
            </div>
          </div>
        );
      };

      const MixedNumber = () => {
        const [whole, setWhole] = useState(1);
        const [denominator, setDenominator] = useState(3);
        const [numerator, setNumerator] = useState(2);
        return (
          <div className="space-y-4">
            <div className="bg-white rounded-xl p-5">
              <div className="space-y-2 mb-4">
                {Array.from({ length: whole }, (_, i) => (<div key={`w-${i}`} className="flex gap-0.5">{Array.from({ length: denominator }, (_, j) => (<div key={j} className="flex-1 h-8 border border-slate-400 rounded bg-emerald-500" />))}</div>))}
                <div className="flex gap-0.5">{Array.from({ length: denominator }, (_, j) => (<div key={j} className={`flex-1 h-8 border border-slate-400 rounded ${j < numerator ? 'bg-amber-500' : 'bg-slate-100'}`} />))}</div>
              </div>
              <div className="text-center mb-3 flex items-center justify-center gap-2"><span className="text-2xl font-bold text-emerald-600">{whole}</span><span className="text-sm text-slate-500">과</span><div className="inline-flex flex-col items-center"><div className="text-xl font-bold text-amber-600">{numerator}</div><div className="h-0.5 w-5 bg-slate-900"></div><div className="text-xl font-bold text-amber-600">{denominator}</div></div></div>
              <div className="text-center bg-slate-50 py-2 px-4 rounded-lg"><p className="text-xs text-slate-500 mb-0.5">자연수 + 진분수</p><p className="text-sm font-semibold text-slate-700"><span className="text-emerald-600">{whole}</span>과 <span className="text-amber-600">{numerator}/{denominator}</span> = 대분수</p></div>
            </div>
            <div className="bg-white rounded-xl p-4 space-y-3">
              <div><label className="text-xs font-semibold text-slate-600 mb-1.5 block">자연수 부분</label><div className="flex items-center gap-3"><button onClick={() => setWhole(Math.max(1, whole - 1))} className="w-9 h-9 rounded-lg bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Minus className="w-4 h-4" /></button><span className="font-bold text-lg w-10 text-center">{whole}</span><button onClick={() => setWhole(Math.min(4, whole + 1))} className="w-9 h-9 rounded-lg bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Plus className="w-4 h-4" /></button></div></div>
              <div><label className="text-xs font-semibold text-slate-600 mb-1.5 block">분모</label><div className="flex items-center gap-3"><button onClick={() => { const v = Math.max(2, denominator - 1); setDenominator(v); if (numerator >= v) setNumerator(v - 1); }} className="w-9 h-9 rounded-lg bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Minus className="w-4 h-4" /></button><span className="font-bold text-lg w-10 text-center">{denominator}</span><button onClick={() => setDenominator(Math.min(8, denominator + 1))} className="w-9 h-9 rounded-lg bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Plus className="w-4 h-4" /></button></div></div>
              <div><label className="text-xs font-semibold text-slate-600 mb-1.5 block">분자 (분모보다 작아야 진분수)</label><div className="flex items-center gap-3"><button onClick={() => setNumerator(Math.max(1, numerator - 1))} className="w-9 h-9 rounded-lg bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Minus className="w-4 h-4" /></button><span className="font-bold text-lg w-10 text-center">{numerator}</span><button onClick={() => setNumerator(Math.min(denominator - 1, numerator + 1))} className="w-9 h-9 rounded-lg bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Plus className="w-4 h-4" /></button></div></div>
            </div>
          </div>
        );
      };

      const Convert = () => {
        const [denominator, setDenominator] = useState(3);
        const [improperNum, setImproperNum] = useState(5);
        const whole = Math.floor(improperNum / denominator);
        const remainder = improperNum % denominator;
        return (
          <div className="space-y-4">
            <div className="bg-white rounded-xl p-5">
              <p className="text-xs font-semibold text-slate-600 mb-3">가분수 → 대분수 변환</p>
              <div className="space-y-2 mb-4">
                {Array.from({ length: whole }, (_, i) => (<div key={`w-${i}`} className="flex gap-0.5">{Array.from({ length: denominator }, (_, j) => (<div key={j} className="flex-1 h-7 border border-slate-400 rounded bg-emerald-500" />))}</div>))}
                {remainder > 0 && (<div className="flex gap-0.5">{Array.from({ length: denominator }, (_, j) => (<div key={j} className={`flex-1 h-7 border border-slate-400 rounded ${j < remainder ? 'bg-amber-500' : 'bg-slate-100'}`} />))}</div>)}
              </div>
              <div className="bg-slate-900 text-white rounded-lg p-4 space-y-2">
                <div className="flex items-center justify-between"><span className="text-xs text-slate-400">가분수</span><div className="inline-flex flex-col items-center"><span className="font-bold text-lg">{improperNum}</span><div className="h-0.5 w-5 bg-white"></div><span className="font-bold text-lg">{denominator}</span></div></div>
                <div className="text-center text-emerald-400 text-xs">↓ {improperNum} ÷ {denominator} = {whole} 나머지 {remainder}</div>
                <div className="flex items-center justify-between"><span className="text-xs text-slate-400">대분수</span><div className="flex items-center gap-1">{whole > 0 && <span className="font-bold text-lg">{whole}</span>}{remainder > 0 && (<>{whole > 0 && <span className="text-xs text-slate-400">과</span>}<div className="inline-flex flex-col items-center"><span className="font-bold text-lg">{remainder}</span><div className="h-0.5 w-5 bg-white"></div><span className="font-bold text-lg">{denominator}</span></div></>)}{remainder === 0 && <span className="text-xs text-slate-400">(나머지 없음)</span>}</div></div>
              </div>
            </div>
            <div className="bg-white rounded-xl p-4 space-y-3">
              <div><label className="text-xs font-semibold text-slate-600 mb-1.5 block">분모</label><div className="flex items-center gap-3"><button onClick={() => setDenominator(Math.max(2, denominator - 1))} className="w-9 h-9 rounded-lg bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Minus className="w-4 h-4" /></button><span className="font-bold text-lg w-10 text-center">{denominator}</span><button onClick={() => setDenominator(Math.min(6, denominator + 1))} className="w-9 h-9 rounded-lg bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Plus className="w-4 h-4" /></button></div></div>
              <div><label className="text-xs font-semibold text-slate-600 mb-1.5 block">가분수의 분자</label><div className="flex items-center gap-3"><button onClick={() => setImproperNum(Math.max(denominator, improperNum - 1))} className="w-9 h-9 rounded-lg bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Minus className="w-4 h-4" /></button><span className="font-bold text-lg w-10 text-center">{improperNum}</span><button onClick={() => setImproperNum(Math.min(denominator * 4, improperNum + 1))} className="w-9 h-9 rounded-lg bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Plus className="w-4 h-4" /></button></div></div>
            </div>
          </div>
        );
      };

      const Compare = () => {
        const [n1, setN1] = useState(3);
        const [d1, setD1] = useState(5);
        const [n2, setN2] = useState(2);
        const [d2, setD2] = useState(5);
        const sign = (n1 / d1) > (n2 / d2) ? '>' : (n1 / d1) < (n2 / d2) ? '<' : '=';
        return (
          <div className="space-y-4">
            <div className="bg-white rounded-xl p-5">
              <div className="space-y-4 mb-4">
                <div><p className="text-xs text-slate-600 mb-1.5">첫 번째 분수: {n1}/{d1}</p><div className="flex gap-0.5">{Array.from({ length: d1 }, (_, i) => (<div key={i} className={`flex-1 h-8 border border-slate-400 rounded ${i < n1 ? 'bg-emerald-500' : 'bg-slate-100'}`} />))}</div></div>
                <div><p className="text-xs text-slate-600 mb-1.5">두 번째 분수: {n2}/{d2}</p><div className="flex gap-0.5">{Array.from({ length: d2 }, (_, i) => (<div key={i} className={`flex-1 h-8 border border-slate-400 rounded ${i < n2 ? 'bg-blue-500' : 'bg-slate-100'}`} />))}</div></div>
              </div>
              <div className="bg-slate-900 text-white rounded-lg p-4 flex items-center justify-center gap-4">
                <div className="inline-flex flex-col items-center"><span className="font-bold text-xl text-emerald-400">{n1}</span><div className="h-0.5 w-6 bg-emerald-400"></div><span className="font-bold text-xl text-emerald-400">{d1}</span></div>
                <span className="font-bold text-3xl">{sign}</span>
                <div className="inline-flex flex-col items-center"><span className="font-bold text-xl text-blue-400">{n2}</span><div className="h-0.5 w-6 bg-blue-400"></div><span className="font-bold text-xl text-blue-400">{d2}</span></div>
              </div>
            </div>
            <div className="bg-white rounded-xl p-4 grid grid-cols-2 gap-3">
              <div><label className="text-xs font-semibold text-emerald-600 mb-1.5 block">첫째 분자</label><div className="flex items-center gap-2"><button onClick={() => setN1(Math.max(1, n1 - 1))} className="w-7 h-7 rounded bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Minus className="w-3 h-3" /></button><span className="font-bold text-sm w-6 text-center">{n1}</span><button onClick={() => setN1(Math.min(d1, n1 + 1))} className="w-7 h-7 rounded bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Plus className="w-3 h-3" /></button></div></div>
              <div><label className="text-xs font-semibold text-emerald-600 mb-1.5 block">첫째 분모</label><div className="flex items-center gap-2"><button onClick={() => { const v = Math.max(2, d1 - 1); setD1(v); if (n1 > v) setN1(v); }} className="w-7 h-7 rounded bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Minus className="w-3 h-3" /></button><span className="font-bold text-sm w-6 text-center">{d1}</span><button onClick={() => setD1(Math.min(8, d1 + 1))} className="w-7 h-7 rounded bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Plus className="w-3 h-3" /></button></div></div>
              <div><label className="text-xs font-semibold text-blue-600 mb-1.5 block">둘째 분자</label><div className="flex items-center gap-2"><button onClick={() => setN2(Math.max(1, n2 - 1))} className="w-7 h-7 rounded bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Minus className="w-3 h-3" /></button><span className="font-bold text-sm w-6 text-center">{n2}</span><button onClick={() => setN2(Math.min(d2, n2 + 1))} className="w-7 h-7 rounded bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Plus className="w-3 h-3" /></button></div></div>
              <div><label className="text-xs font-semibold text-blue-600 mb-1.5 block">둘째 분모</label><div className="flex items-center gap-2"><button onClick={() => { const v = Math.max(2, d2 - 1); setD2(v); if (n2 > v) setN2(v); }} className="w-7 h-7 rounded bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Minus className="w-3 h-3" /></button><span className="font-bold text-sm w-6 text-center">{d2}</span><button onClick={() => setD2(Math.min(8, d2 + 1))} className="w-7 h-7 rounded bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Plus className="w-3 h-3" /></button></div></div>
            </div>
          </div>
        );
      };

      const renderManipulative = (type) => {
        switch (type) {
          case 'pizza': return <PizzaSlice />;
          case 'fraction-builder': return <FractionBuilder />;
          case 'equal-share': return <EqualShare />;
          case 'candy-group': return <CandyGroup />;
          case 'reverse-fraction': return <ReverseFraction />;
          case 'proper-improper': return <ProperImproper />;
          case 'mixed-number': return <MixedNumber />;
          case 'convert': return <Convert />;
          case 'compare': return <Compare />;
          default: return null;
        }
      };

      // 호출 모달
      const renderCallModal = () => {
        if (!showCallModal) return null;
        if (callStatus) {
          return (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-2xl max-w-md w-full p-6 slide-up">
                <div className="text-center mb-4">
                  <div className="w-16 h-16 bg-red-500 rounded-full mx-auto mb-3 flex items-center justify-center pulse-ring"><Bell className="w-8 h-8 text-white" /></div>
                  <h3 className="text-xl font-bold text-slate-900 mb-1">선생님께 호출 요청을 보냈어요</h3>
                  <p className="text-sm text-slate-500">잠시만 기다려주세요</p>
                </div>
                <div className="bg-slate-50 rounded-xl p-4 space-y-2 mb-4">
                  <div className="flex items-start gap-3"><span className="text-xl">{callStatus.type.icon}</span><div className="flex-1"><p className="text-sm font-semibold text-slate-900">{callStatus.type.label}</p><p className="text-xs text-slate-500 mt-0.5">{callStatus.type.description}</p></div></div>
                  <div className="border-t border-slate-200 pt-2 mt-2 space-y-1 text-xs">
                    <div className="flex justify-between"><span className="text-slate-500">위치</span><span className="font-medium text-slate-700">{callStatus.location}</span></div>
                    <div className="flex justify-between"><span className="text-slate-500">시간</span><span className="font-medium text-slate-700">{callStatus.time}</span></div>

                <p className="text-xs text-slate-500 mb-4">학생들이 가장 많이 막힌 차시 순서</p>
                {sortedLessons.length === 0 ? (
                  <p className="text-center text-sm text-slate-500 py-8">아직 호출 데이터가 없어요</p>
                ) : (
                  <div className="space-y-2">
                    {sortedLessons.slice(0, 5).map(([location, count], idx) => {
                      const maxCount = sortedLessons[0][1];
                      const percent = (count / maxCount) * 100;
                      return (
                        <div key={idx}>
                          <div className="flex items-center justify-between mb-1"><p className="text-xs font-medium text-slate-700 truncate flex-1 mr-2">{location}</p><span className="text-xs font-bold text-slate-900 flex-shrink-0">{count}건</span></div>
                          <div className="h-2 bg-slate-100 rounded-full overflow-hidden"><div className={`h-full rounded-full ${idx === 0 ? 'bg-red-500' : idx === 1 ? 'bg-orange-500' : 'bg-slate-400'}`} style={{ width: `${percent}%` }} /></div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>

              <div className="bg-white border border-slate-200 rounded-2xl p-6">
                <h3 className="font-bold text-slate-900 mb-1 text-sm">막힘 유형 분포</h3>
                <p className="text-xs text-slate-500 mb-4">학생들이 자주 호출하는 이유</p>
                <div className="space-y-3">
                  {callTypes.map((type) => {
                    const count = callsByType[type.id] || 0;
                    const percent = calls.length > 0 ? Math.round((count / calls.length) * 100) : 0;
                    return (
                      <div key={type.id}>
                        <div className="flex items-center justify-between mb-1"><div className="flex items-center gap-2"><span>{type.icon}</span><p className="text-xs font-medium text-slate-700">{type.label}</p></div><span className="text-xs font-bold text-slate-900">{count}건 ({percent}%)</span></div>
                        <div className="h-1.5 bg-slate-100 rounded-full overflow-hidden"><div className="h-full bg-slate-700 rounded-full" style={{ width: `${percent}%` }} /></div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>

            <div className="bg-white border border-slate-200 rounded-2xl p-6">
              <h3 className="font-bold text-slate-900 mb-1 text-sm">최근 호출 이력</h3>
              <p className="text-xs text-slate-500 mb-4">처리된 호출 포함 전체 기록</p>
              {calls.length === 0 ? (
                <p className="text-center text-sm text-slate-500 py-8">아직 호출 이력이 없어요</p>
              ) : (
                <div className="space-y-2">
                  {calls.slice(0, 10).map((call) => {
                    const type = callTypes.find(t => t.id === call.call_type) || { icon: '❓', label: call.call_type };
                    const time = new Date(call.created_at).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                    return (
                      <div key={call.id} className={`flex items-center gap-3 p-3 rounded-lg border ${call.status === 'pending' ? 'bg-red-50 border-red-100' : 'bg-slate-50 border-slate-100'}`}>
                        <span className="text-lg flex-shrink-0">{type.icon}</span>
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center gap-2 mb-0.5"><p className="font-semibold text-sm text-slate-900">{call.student_id}</p><span className="text-xs text-slate-400">·</span><span className="text-xs text-slate-500">{time}</span>{call.status === 'pending' ? <span className="text-xs bg-red-100 text-red-700 px-1.5 py-0.5 rounded font-semibold">대기</span> : <span className="text-xs bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded">처리완료</span>}</div>
                          <p className="text-xs text-slate-600 truncate">{type.label} · {call.lesson_title || '단원 시작 전'}</p>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
        );
      };

      // 로그인 안 됐으면 로그인 화면
      if (!studentId) {
        return <LoginScreen onLogin={setStudentId} />;
      }

      // 교사 모드
      if (studentId === 'TEACHER') {
        return (
          <div className="min-h-screen bg-slate-50">
            <div className="bg-white border-b border-slate-200 sticky top-0 z-30">
              <div className="max-w-6xl mx-auto px-5 py-3 flex items-center justify-between">
                <div className="flex items-center gap-2"><School className="w-5 h-5 text-slate-700" /><span className="text-sm font-bold text-slate-900">능동초 N-Protocol · 교사용</span></div>
                <button onClick={handleLogout} className="inline-flex items-center gap-1.5 text-xs text-slate-600 hover:text-slate-900 transition-colors"><LogOut className="w-3.5 h-3.5" />로그아웃</button>
              </div>
            </div>
            <div className="max-w-6xl mx-auto px-5 py-8">{renderTeacherDashboard()}</div>
          </div>
        );
      }

      // 학생 모드
      return (
        <div className="min-h-screen bg-slate-50">
          <div className="bg-white border-b border-slate-200 sticky top-0 z-30">
            <div className="max-w-6xl mx-auto px-5 py-3 flex items-center justify-between">
              <div className="flex items-center gap-2"><School className="w-5 h-5 text-slate-700" /><span className="text-sm font-bold text-slate-900">N-Protocol</span><span className="text-xs bg-slate-100 text-slate-700 px-2 py-0.5 rounded-md font-semibold">{studentId}</span></div>
              <button onClick={handleLogout} className="inline-flex items-center gap-1.5 text-xs text-slate-600 hover:text-slate-900 transition-colors"><LogOut className="w-3.5 h-3.5" />로그아웃</button>
            </div>
          </div>

          <div className="max-w-2xl mx-auto px-5 py-8 sm:py-10 pb-32">
            {view === 'home' && renderHome()}
            {view === 'prerequisite' && renderPrerequisite()}
            {view === 'lesson' && renderLesson()}
          </div>

          {renderCallButton()}
          {renderCallModal()}
          {showQuiz && currentLesson && (
            <QuizModal 
              lesson={currentLesson} 
              studentId={studentId}
              onClose={() => setShowQuiz(false)}
              onComplete={handleQuizComplete}
            />
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<NProtocol />);
  </script>
</body>
</html>
