<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>N-Protocol · 3학년 2학기 분수</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif; }
    @keyframes pulse-ring { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    .pulse-ring { animation: pulse-ring 2s infinite; }
    @keyframes slide-up { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .slide-up { animation: slide-up 0.3s ease-out; }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    .fade-in { animation: fade-in 0.3s ease-out; }
    @keyframes pop-in { 0% { transform: scale(0.5); opacity: 0; } 60% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); } }
    .pop-in { animation: pop-in 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes wiggle { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-3deg); } 75% { transform: rotate(3deg); } }
    .wiggle { animation: wiggle 0.4s ease-in-out; }
    @keyframes confetti { 0% { transform: translateY(0) rotate(0); opacity: 1; } 100% { transform: translateY(80px) rotate(360deg); opacity: 0; } }
    .confetti { animation: confetti 1s ease-out forwards; }
    @keyframes bounce-soft { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    .bounce-soft { animation: bounce-soft 0.6s ease-in-out; }
    @keyframes glow { 0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 50% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); } }
    .glow { animation: glow 1.5s ease-out infinite; }
    .draggable { cursor: grab; user-select: none; -webkit-user-select: none; touch-action: none; }
    .draggable:active { cursor: grabbing; }
    .drop-zone { transition: all 0.2s; }
    .drop-zone.over { background-color: #fef3c7 !important; border-color: #f59e0b !important; transform: scale(1.02); }

    /* ===== 인쇄용 CSS ===== */
    @media print {
      /* 일반 화면은 모두 숨김 */
      body * { visibility: hidden; }
      /* 인쇄 영역만 표시 */
      .print-area, .print-area * { visibility: visible; }
      .print-area { position: absolute; left: 0; top: 0; width: 100%; padding: 0; margin: 0; }
      /* 학생별 페이지 구분 */
      .print-student-report { page-break-after: always; page-break-inside: avoid; padding: 18mm 16mm; }
      .print-student-report:last-child { page-break-after: auto; }
      /* 색상 인쇄 유지 */
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      /* 그림자/애니메이션 제거 */
      * { box-shadow: none !important; animation: none !important; }
      /* 페이지 설정 */
      @page { size: A4; margin: 0; }
      /* 폰트 크기 조정 */
      html { font-size: 11pt; }
    }
    /* 화면에서는 인쇄 영역 숨김 */
    .print-area { display: none; }
    @media print {
      .print-area { display: block; }
      .no-print { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
// ===========================================================
    // Supabase 연결 정보 (능동초 N-Protocol)
    // ===========================================================
    const SUPABASE_URL = 'https://quiobldufshndkfqfgvo.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1aW9ibGR1ZnNobmRrZnFmZ3ZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMjIwOTcsImV4cCI6MjA5NDY5ODA5N30.Pyuk6JoUZQ1HHXaWzns5u_ynmilJW46BcTQ2GIK8D-c';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { useState, useEffect, useCallback } = React;

    const Icon = ({ children, className = "w-4 h-4" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
    );

    const ArrowRight = ({ className }) => (<Icon className={className}><path d="M5 12h14" /><path d="m12 5 7 7-7 7" /></Icon>);
    const ArrowLeft = ({ className }) => (<Icon className={className}><path d="M19 12H5" /><path d="m12 19-7-7 7-7" /></Icon>);
    const Sprout = ({ className }) => (<Icon className={className}><path d="M7 20h10" /><path d="M10 20c5.5-2.5.8-6.4 3-10" /><path d="M9.5 9.4c1.1.8 1.8 2.2 2.3 3.7-2 .4-3.5.4-4.8-.3-1.2-.6-2.3-1.9-3-4.2 2.8-.5 4.4 0 5.5.8z" /><path d="M14.1 6a7 7 0 0 0-1.1 4c1.9-.1 3.3-.6 4.3-1.4 1-1 1.6-2.3 1.7-4.6-2.7.1-4 1-4.9 2z" /></Icon>);
    const Sparkles = ({ className }) => (<Icon className={className}><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z" /></Icon>);
    const MessageCircle = ({ className }) => (<Icon className={className}><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22z" /></Icon>);
    const BookOpen = ({ className }) => (<Icon className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" /><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" /></Icon>);
    const Hand = ({ className }) => (<Icon className={className}><path d="M18 11V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2" /><path d="M14 10V4a2 2 0 0 0-2-2a2 2 0 0 0-2 2v2" /><path d="M10 10.5V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2v8" /><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15" /></Icon>);
    const Plus = ({ className }) => (<Icon className={className}><path d="M5 12h14" /><path d="M12 5v14" /></Icon>);
    const Minus = ({ className }) => (<Icon className={className}><path d="M5 12h14" /></Icon>);
    const Bell = ({ className }) => (<Icon className={className}><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9" /><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0" /></Icon>);
    const X = ({ className }) => (<Icon className={className}><path d="M18 6 6 18" /><path d="m6 6 12 12" /></Icon>);
    const Check = ({ className }) => (<Icon className={className}><path d="M20 6 9 17l-5-5" /></Icon>);
    const HelpCircle = ({ className }) => (<Icon className={className}><circle cx="12" cy="12" r="10" /><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" /><path d="M12 17h.01" /></Icon>);
    const CheckCircle = ({ className }) => (<Icon className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><path d="m9 11 3 3L22 4" /></Icon>);
    const Trophy = ({ className }) => (<Icon className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6" /><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18" /><path d="M4 22h16" /><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22" /><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22" /><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z" /></Icon>);
    const TrendingUp = ({ className }) => (<Icon className={className}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17" /><polyline points="16 7 22 7 22 13" /></Icon>);
    const Users = ({ className }) => (<Icon className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M22 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></Icon>);
    const Activity = ({ className }) => (<Icon className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12" /></Icon>);
    const RefreshCw = ({ className }) => (<Icon className={className}><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" /><path d="M3 3v5h5" /><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" /><path d="M16 16h5v5" /></Icon>);
    const School = ({ className }) => (<Icon className={className}><path d="M14 22v-4a2 2 0 1 0-4 0v4" /><path d="m18 10 4 2v10" /><path d="M18 5v17" /><path d="m4 6 8-4 8 4" /><path d="M6 5v17" /><circle cx="12" cy="9" r="2" /></Icon>);
const LogOut = ({ className }) => (<Icon className={className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" /><polyline points="16 17 21 12 16 7" /><line x1="21" y1="12" x2="9" y2="12" /></Icon>);

    // ===========================================================
    // 로그인 화면
    // ===========================================================
    function LoginScreen({ onLogin }) {
      const [grade, setGrade] = useState(3);
      const [classNum, setClassNum] = useState(1);
      const [studentNum, setStudentNum] = useState(1);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');

      const handleLogin = async () => {
        setLoading(true);
        setError('');
        const studentId = `${grade}-${classNum}-${studentNum}`;
        try {
          const { data: existing } = await db
            .from('students')
            .select('*')
            .eq('id', studentId)
            .maybeSingle();

          if (!existing) {
            const { error: insertError } = await db
              .from('students')
              .insert({ id: studentId, grade, class_num: classNum, student_num: studentNum });
            if (insertError) throw insertError;
          }

          onLogin(studentId);
        } catch (err) {
          setError('연결에 실패했어요. 인터넷을 확인해주세요.');
          console.error('로그인 오류:', err);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-50 to-emerald-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-3xl shadow-xl max-w-md w-full p-8 slide-up">
            <div className="text-center mb-6">
              <div className="inline-flex items-center gap-2 mb-3">
                <School className="w-5 h-5 text-slate-700" />
                <p className="text-xs font-semibold tracking-[0.2em] text-slate-500">N-PROTOCOL</p>
              </div>
              <h1 className="text-2xl font-bold text-slate-900 mb-2">시작하기</h1>
              <p className="text-sm text-slate-500">학년, 반, 번호를 선택해주세요</p>
            </div>

            <div className="space-y-4 mb-6">
              <div>
                <label className="text-xs font-semibold text-slate-600 mb-2 block">학년</label>
                <div className="grid grid-cols-4 gap-2">
                  {[3, 4, 5, 6].map(g => (
                    <button key={g} onClick={() => setGrade(g)} className={`py-3 rounded-xl font-bold transition-all ${grade === g ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-700 hover:bg-slate-200'}`}>
                      {g}학년
                    </button>
                  ))}
                </div>
              </div>

              <div>
                <label className="text-xs font-semibold text-slate-600 mb-2 block">반</label>
                <div className="flex items-center gap-3">
                  <button onClick={() => setClassNum(Math.max(1, classNum - 1))} className="w-12 h-12 rounded-xl bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Minus className="w-5 h-5" /></button>
                  <div className="flex-1 text-center bg-slate-50 rounded-xl py-3">
                    <span className="text-2xl font-bold text-slate-900">{classNum}</span>
                    <span className="text-sm text-slate-500 ml-1">반</span>
                  </div>
                  <button onClick={() => setClassNum(Math.min(20, classNum + 1))} className="w-12 h-12 rounded-xl bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Plus className="w-5 h-5" /></button>
                </div>
              </div>

              <div>
                <label className="text-xs font-semibold text-slate-600 mb-2 block">번호</label>
                <div className="flex items-center gap-3">
                  <button onClick={() => setStudentNum(Math.max(1, studentNum - 1))} className="w-12 h-12 rounded-xl bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Minus className="w-5 h-5" /></button>
                  <div className="flex-1 text-center bg-slate-50 rounded-xl py-3">
                    <span className="text-2xl font-bold text-slate-900">{studentNum}</span>
                    <span className="text-sm text-slate-500 ml-1">번</span>
                  </div>
                  <button onClick={() => setStudentNum(Math.min(40, studentNum + 1))} className="w-12 h-12 rounded-xl bg-slate-100 hover:bg-slate-200 flex items-center justify-center"><Plus className="w-5 h-5" /></button>
                </div>
              </div>
            </div>

            <div className="bg-emerald-50 border border-emerald-100 rounded-xl p-3 mb-5 text-center">
              <p className="text-xs text-emerald-700">선택한 정보</p>
              <p className="text-lg font-bold text-emerald-900">{grade}학년 {classNum}반 {studentNum}번</p>
            </div>

            {error && <p className="text-xs text-red-600 text-center mb-3">{error}</p>}

            <button onClick={handleLogin} disabled={loading} className="w-full bg-slate-900 hover:bg-slate-800 disabled:bg-slate-400 text-white font-bold py-4 rounded-xl transition-colors">
              {loading ? '연결 중...' : '시작하기'}
            </button>

            <div className="mt-6 pt-6 border-t border-slate-100 text-center">
              <button onClick={() => onLogin('TEACHER')} className="text-xs text-slate-400 hover:text-slate-700 transition-colors">
                선생님으로 입장하기 →
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ===========================================================
    // 퀴즈 모달 - 부모와 완전히 독립된 컴포넌트
    // 자기 상태만 관리하고, 결과만 부모에게 알려줌
    // ===========================================================
    function QuizModal({ lesson, onClose, onComplete }) {
      const [currentQ, setCurrentQ] = useState(0);
      const [selected, setSelected] = useState(null);
      const [results, setResults] = useState([]);
      const [showResult, setShowResult] = useState(false);

      if (!lesson || !lesson.quiz || lesson.quiz.length === 0) return null;
      const totalQ = lesson.quiz.length;

      const handleAnswer = () => {
        if (selected === null) return;
        const q = lesson.quiz[currentQ];
        const isCorrect = selected === q.answer;
        const newResults = [...results, isCorrect];

        if (currentQ + 1 < totalQ) {
          setResults(newResults);
          setCurrentQ(currentQ + 1);
          setSelected(null);
        } else {
          setResults(newResults);
          setShowResult(true);
        }
      };

      const handleRetry = () => {
        setCurrentQ(0);
        setSelected(null);
        setResults([]);
        setShowResult(false);
      };

      const handleClose = () => {
        // 닫힐 때 결과를 부모에게 알림
        if (showResult) {
          const correctCount = results.filter(r => r).length;
          const passed = correctCount === totalQ;
          onComplete(lesson.id, passed);
        }
        onClose();
      };

      // 결과 화면
      if (showResult) {
        const correctCount = results.filter(r => r).length;
        const passed = correctCount === totalQ;

        return (
          <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
            <div className="bg-white rounded-2xl max-w-md w-full p-6 slide-up max-h-[90vh] overflow-y-auto">
              <div className="text-center mb-5">
                {passed ? (
                  <>
                    <div className="w-16 h-16 bg-emerald-500 rounded-full mx-auto mb-3 flex items-center justify-center">
                      <Trophy className="w-8 h-8 text-white" />
                    </div>
                    <h3 className="text-xl font-bold text-slate-900 mb-1">완벽해요! 통과!</h3>
                    <p className="text-sm text-slate-600">{totalQ}문제 모두 맞혔어요 ({correctCount}/{totalQ}). 다음 차시로 가도 좋아요</p>
                  </>
                ) : (
                  <>
                    <div className="w-16 h-16 bg-amber-500 rounded-full mx-auto mb-3 flex items-center justify-center">
                      <RefreshCw className="w-8 h-8 text-white" />
                    </div>
                    <h3 className="text-xl font-bold text-slate-900 mb-1">조금 더 익혀볼까요?</h3>
                    <p className="text-sm text-slate-600 mb-1">{totalQ}문제 중 <strong className="text-amber-700">{correctCount}문제</strong> 맞혔어요</p>
                    <p className="text-xs text-slate-500">통과하려면 {totalQ}문제를 <strong>모두</strong> 맞혀야 해요. 다시 도전해볼까요?</p>
                  </>
                )}
              </div>
              <div className="space-y-2 mb-5">
                {lesson.quiz.map((q, idx) => (
                  <div key={idx} className={`p-3 rounded-lg border ${results[idx] ? 'bg-emerald-50 border-emerald-200' : 'bg-rose-50 border-rose-200'}`}>
                    <div className="flex items-start gap-2">
                      {results[idx] ? <Check className="w-4 h-4 text-emerald-600 mt-0.5 flex-shrink-0" /> : <X className="w-4 h-4 text-rose-600 mt-0.5 flex-shrink-0" />}
                      <div className="flex-1 min-w-0">
                        <p className="text-sm font-medium text-slate-900 mb-1">{idx + 1}. {q.q}</p>
                        {!results[idx] && <p className="text-xs text-slate-600">정답: <span className="font-semibold">{q.options[q.answer]}</span> · {q.explain}</p>}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
              <div className="flex gap-2">
                <button onClick={handleRetry} className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-2.5 rounded-lg text-sm">다시 풀기</button>
                <button onClick={handleClose} className="flex-1 bg-slate-900 hover:bg-slate-800 text-white font-semibold py-2.5 rounded-lg text-sm">닫기</button>
              </div>
            </div>
          </div>
        );
      }

      // 문제 화면
      const q = lesson.quiz[currentQ];
      return (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
          <div className="bg-white rounded-2xl max-w-md w-full p-6 slide-up">
            <div className="flex items-center justify-between mb-4">
              <div className="flex items-center gap-2">
                <CheckCircle className="w-5 h-5 text-blue-600" />
                <h3 className="font-bold text-slate-900">자기 점검 퀴즈</h3>
              </div>
              <button onClick={onClose} className="w-8 h-8 rounded-lg bg-slate-100 hover:bg-slate-200 flex items-center justify-center">
                <X className="w-4 h-4 text-slate-600" />
              </button>
            </div>
            <div className="flex items-center gap-1.5 mb-5">
              {lesson.quiz.map((_, idx) => (
                <div key={idx} className={`h-1.5 flex-1 rounded-full ${idx < currentQ ? 'bg-emerald-500' : idx === currentQ ? 'bg-blue-500' : 'bg-slate-200'}`} />
              ))}
            </div>
            <p className="text-xs font-semibold text-slate-500 mb-1">문제 {currentQ + 1} / {totalQ}</p>
            <p className="text-base font-medium text-slate-900 mb-5 leading-relaxed">{q.q}</p>
            <div className="space-y-2 mb-5">
              {q.options.map((opt, idx) => (
                <button key={idx} onClick={() => setSelected(idx)} className={`w-full text-left p-3 rounded-lg border-2 transition-all ${selected === idx ? 'border-blue-500 bg-blue-50' : 'border-slate-200 hover:border-slate-400'}`}>
                  <div className="flex items-center gap-3">
                    <div className={`w-6 h-6 rounded-full border-2 flex-shrink-0 flex items-center justify-center ${selected === idx ? 'border-blue-500 bg-blue-500' : 'border-slate-300'}`}>
                      {selected === idx && <div className="w-2 h-2 bg-white rounded-full" />}
                    </div>
                    <span className="text-sm font-medium text-slate-800">{opt}</span>
                  </div>
                </button>
              ))}
            </div>
            <button onClick={handleAnswer} disabled={selected === null} className={`w-full py-3 rounded-lg font-semibold text-sm transition-all ${selected !== null ? 'bg-slate-900 hover:bg-slate-800 text-white' : 'bg-slate-100 text-slate-400 cursor-not-allowed'}`}>
              {currentQ + 1 < totalQ ? '다음 문제' : '결과 확인'}
            </button>
          </div>
        </div>
      );
    }

    // ===========================================================
    // 메인 앱
    // ===========================================================
    function NProtocol() {
      const [studentId, setStudentId] = useState(null);
      const [mode, setMode] = useState('student');
      const [view, setView] = useState('home');
      const [currentLesson, setCurrentLesson] = useState(null);
      const [showCallModal, setShowCallModal] = useState(false);

      // ===== 디지털 교구들 =====

      // 도입: 🍕 피자 가르기 — 인원 슬라이더 + 빛나는 한 조각 + 미션
      const PizzaSlice = () => {
        const [people, setPeople] = useState(4);
        const [eaten, setEaten] = useState(0);
        const [celebrate, setCelebrate] = useState(false);
        const colors = ['#fde68a', '#fbbf24', '#f59e0b', '#ef4444', '#ec4899', '#a855f7', '#3b82f6', '#10b981'];
        return (
          <div className="space-y-3">
            <div className="bg-gradient-to-br from-amber-50 to-orange-50 rounded-xl p-5">
              <div className="text-center mb-2">
                <span className="inline-block bg-white px-3 py-1 rounded-full text-xs font-semibold text-amber-700 border border-amber-200">🎯 미션: {people}명이 똑같이 나눠 먹어요</span>
              </div>
              <div className="flex justify-center">
                <svg viewBox="-120 -120 240 240" className="w-60 h-60">
                  {/* 피자 본체 */}
                  <circle cx="0" cy="0" r="105" fill="#92400e" />
                  <circle cx="0" cy="0" r="100" fill="#fbbf24" />
                  {/* 토핑 (페퍼로니) */}
                  {Array.from({ length: people * 2 }, (_, i) => {
                    const a = (Math.PI * 2 * i) / (people * 2) - Math.PI / 2;
                    const r = 55 + (i % 2) * 20;
                    return <circle key={`top-${i}`} cx={Math.cos(a) * r} cy={Math.sin(a) * r} r="7" fill="#dc2626" />;
                  })}
                  {/* 자르기 선 */}
                  {Array.from({ length: people }, (_, i) => {
                    const a = (Math.PI * 2 * i) / people - Math.PI / 2;
                    return <line key={`cut-${i}`} x1="0" y1="0" x2={Math.cos(a) * 100} y2={Math.sin(a) * 100} stroke="#7c2d12" strokeWidth="2.5" strokeLinecap="round" />;
                  })}
                  {/* 클릭 가능한 조각들 */}
                  {Array.from({ length: people }, (_, i) => {
                    const a = (Math.PI * 2) / people;
                    const start = i * a - Math.PI / 2;
                    const end = (i + 1) * a - Math.PI / 2;
                    const x1 = Math.cos(start) * 100, y1 = Math.sin(start) * 100;
                    const x2 = Math.cos(end) * 100, y2 = Math.sin(end) * 100;
                    const largeArc = a > Math.PI ? 1 : 0;
                    const isEaten = i < eaten;
                    return (
                      <path
                        key={`slice-${i}`}
                        d={`M 0 0 L ${x1} ${y1} A 100 100 0 ${largeArc} 1 ${x2} ${y2} Z`}
                        fill={isEaten ? '#f1f5f9' : 'transparent'}
                        stroke={isEaten ? '#94a3b8' : 'transparent'}
                        strokeWidth="2"
                        className="cursor-pointer hover:opacity-70 transition-all"
                        onClick={() => {
                          if (!isEaten) {
                            setEaten(eaten + 1);
                            setCelebrate(true);
                            setTimeout(() => setCelebrate(false), 400);
                          } else if (i === eaten - 1) {
                            setEaten(eaten - 1);
                          }
                        }}
                      />
                    );
                  })}
                </svg>
              </div>
              <div className="text-center mt-3">
                <p className="text-sm text-slate-700">한 명이 먹는 양 = <span className="text-2xl font-black text-orange-600">1/{people}</span></p>
                {eaten > 0 && <p className="text-xs text-emerald-700 mt-1 font-semibold pop-in">{eaten}명이 먹었어요! ({eaten}/{people})</p>}
                {eaten === people && <p className="text-base text-amber-700 mt-2 font-bold bounce-soft">🎉 모두 똑같이 나눠 먹었어요!</p>}

              <div className="flex justify-between text-[10px] text-slate-400 mt-0.5"><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span></div>

      // 1차시: 🎨 분수 만들기 — 드래그 색칠 + 미션 모드
      const FractionBuilder = () => {
        const [denominator, setDenominator] = useState(4);
        const [filled, setFilled] = useState([]);
        const [isDrawing, setIsDrawing] = useState(false);
        const [mission, setMission] = useState({ num: 3, denom: 4 });
        const numerator = filled.length;
        const isCorrect = numerator === mission.num && denominator === mission.denom;

        const toggle = (i) => {
          setFilled(prev => prev.includes(i) ? prev.filter(x => x !== i) : [...prev, i]);
        };

        const newMission = () => {
          const d = 2 + Math.floor(Math.random() * 7);
          const n = 1 + Math.floor(Math.random() * (d - 1));
          setMission({ num: n, denom: d });
          setFilled([]);
        };

        return (
          <div className="space-y-3">
            <div className={`bg-gradient-to-br rounded-xl p-4 ${isCorrect ? 'from-emerald-50 to-teal-50 glow' : 'from-slate-50 to-white'}`}>
              <div className="flex items-center justify-between mb-2 flex-wrap gap-1">
                <span className="inline-block bg-white px-3 py-1 rounded-full text-xs font-semibold text-indigo-700 border border-indigo-200">
                  🎯 미션: <span className="text-lg font-black mx-1">{mission.num}/{mission.denom}</span> 만들기
                </span>
                <button onClick={newMission} className="text-xs bg-white border border-slate-200 hover:bg-slate-50 px-2.5 py-1 rounded-full font-medium text-slate-600">🎲 새 미션</button>
              </div>
              <div className="flex justify-center my-2"
                onMouseUp={() => setIsDrawing(false)}
                onMouseLeave={() => setIsDrawing(false)}
                onTouchEnd={() => setIsDrawing(false)}
              >
                <svg viewBox="-110 -110 220 220" className="w-52 h-52">
                  {Array.from({ length: denominator }, (_, i) => {
                    const angle = (2 * Math.PI) / denominator;
                    const start = i * angle - Math.PI / 2;
                    const end = (i + 1) * angle - Math.PI / 2;
                    const x1 = Math.cos(start) * 100, y1 = Math.sin(start) * 100;
                    const x2 = Math.cos(end) * 100, y2 = Math.sin(end) * 100;
                    const largeArc = angle > Math.PI ? 1 : 0;
                    const isFilled = filled.includes(i);
                    return (
                      <path
                        key={i}
                        d={`M 0 0 L ${x1} ${y1} A 100 100 0 ${largeArc} 1 ${x2} ${y2} Z`}
                        fill={isFilled ? (isCorrect ? '#10b981' : '#6366f1') : '#f8fafc'}
                        stroke="#475569"
                        strokeWidth="2"
                        className="cursor-pointer hover:opacity-80 transition-all"
                        onMouseDown={() => { setIsDrawing(true); toggle(i); }}
                        onMouseEnter={() => { if (isDrawing) toggle(i); }}
                        onTouchStart={() => toggle(i)}
                      />
                    );
                  })}
                </svg>
              </div>
              <div className="text-center">
                <div className="inline-flex flex-col items-center">
                  <span className="text-3xl font-black text-slate-900">{numerator}</span>
                  <div className="h-0.5 w-10 bg-slate-900 my-0.5"></div>
                  <span className="text-3xl font-black text-slate-900">{denominator}</span>
                </div>
                {isCorrect && <p className="text-emerald-700 font-bold text-sm mt-2 pop-in">🎉 정답! 미션 완료!</p>}
              </div>
            </div>
            <div className="bg-white rounded-xl p-3">
              <div className="flex items-center justify-between mb-1.5">
                <label className="text-xs font-semibold text-slate-700">🍰 전체 조각 수 (분모)</label>
                <span className="text-xs text-slate-500">2~9</span>
              </div>
              <input type="range" min="2" max="9" value={denominator} onChange={e => { setDenominator(parseInt(e.target.value)); setFilled([]); }} className="w-full accent-indigo-500" />
              <p className="text-xs text-slate-500 mt-2">💡 조각을 누르거나 드래그해서 색칠하세요</p>
            </div>
          </div>
        );
      };

      // 단원 시작 전: 🍎 똑같이 나누기 — 사과를 정확히 N등분 도전
      const EqualShare = () => {
        const [parts, setParts] = useState(4);
        return (
          <div className="space-y-3">
            <div className="bg-gradient-to-br from-red-50 to-pink-50 rounded-xl p-4">
              <p className="text-xs font-semibold text-red-700 mb-2 text-center">🍎 사과를 {parts}명이 똑같이 나누면?</p>
              <div className="flex justify-center mb-2">
                <svg viewBox="0 0 280 100" className="w-full max-w-sm">
                  {/* 사과 */}
                  <ellipse cx="140" cy="55" rx="125" ry="38" fill="#fecaca" stroke="#991b1b" strokeWidth="2.5" />
                  <ellipse cx="140" cy="50" rx="125" ry="38" fill="#fca5a5" stroke="#991b1b" strokeWidth="2.5" />
                  {/* 자르기 선 (애니메이션) */}
                  {Array.from({ length: parts - 1 }, (_, i) => {
                    const x = 15 + (250 / parts) * (i + 1);
                    return <line key={i} x1={x} y1="12" x2={x} y2="88" stroke="#7f1d1d" strokeWidth="2.5" strokeDasharray="6 3" className="fade-in" />;
                  })}
                  {/* 라벨 */}
                  {Array.from({ length: parts }, (_, i) => {
                    const cx = 15 + (250 / parts) * (i + 0.5);
                    return <text key={`l-${i}`} x={cx} y={56} textAnchor="middle" fontSize="14" fontWeight="bold" fill="#7f1d1d">1/{parts}</text>;
                  })}
                </svg>
              </div>
              <p className="text-center text-sm text-slate-700">한 사람당 <span className="text-xl font-black text-red-600">1/{parts}</span> 만큼!</p>
            </div>
            <div className="bg-white rounded-xl p-3">
              <div className="flex items-center justify-between mb-1.5">
                <label className="text-xs font-semibold text-slate-700">✂️ 몇 명이 나눠 먹을까?</label>
                <span className="text-xs text-slate-500">2~8명</span>
              </div>
              <input type="range" min="2" max="8" value={parts} onChange={e => setParts(parseInt(e.target.value))} className="w-full accent-red-500" />
            </div>
          </div>
        );
      };

      // 2차시: 🍬 사탕 묶기 — 사탕을 드래그해 묶음 만들기 + 미션
      const CandyGroup = () => {
        const [total, setTotal] = useState(12);
        const [denominator, setDenominator] = useState(3);
        const [picked, setPicked] = useState(0); // 학생이 클릭한 묶음 수
        const groupSize = total / denominator;
        const isValid = total % denominator === 0;
        const result = Math.floor(groupSize) * picked;
        const colors = ['#10b981', '#3b82f6', '#a855f7', '#ec4899', '#f59e0b', '#06b6d4'];

        return (
          <div className="space-y-3">
            <div className="bg-gradient-to-br from-pink-50 to-purple-50 rounded-xl p-4">
              <p className="text-xs font-semibold text-purple-700 mb-2 text-center">
                🍬 사탕 {total}개를 <span className="bg-white px-2 py-0.5 rounded font-black">{denominator}묶음</span>으로 똑같이 나눠봐!
              </p>
              {isValid ? (
                <>
                  <div className="flex flex-wrap gap-1 justify-center my-3 max-w-xs mx-auto">
                    {Array.from({ length: total }, (_, i) => {
                      const groupIdx = Math.floor(i / groupSize);
                      const isPicked = groupIdx < picked;
                      const color = isPicked ? colors[groupIdx % colors.length] : '#e2e8f0';
                      return (
                        <button
                          key={i}
                          onClick={() => {
                            if (groupIdx + 1 <= picked) setPicked(groupIdx);
                            else setPicked(groupIdx + 1);
                          }}
                          style={{ backgroundColor: color }}
                          className={`w-7 h-7 rounded-full hover:scale-110 transition-all ${isPicked ? 'shadow-md' : ''} ${(i + 1) % groupSize === 0 ? 'mr-2' : ''}`}
                          title={`${groupIdx + 1}번 묶음`}
                        />
                      );
                    })}
                  </div>
                  <div className="bg-white rounded-lg px-3 py-2.5 text-center">
                    <p className="text-xs text-slate-500">{total} ÷ {denominator} = <span className="font-bold">{groupSize}개씩 한 묶음</span></p>
                    {picked > 0 && (
                      <p className="text-sm text-slate-900 mt-1 pop-in">
                        <span className="font-bold text-purple-700">{picked}/{denominator}</span>
                        <span className="mx-2 text-slate-400">→</span>
                        <span className="text-xl font-black text-purple-600">{result}개</span>
                      </p>
                    )}
                  </div>
                </>
              ) : (
                <p className="text-center text-xs text-amber-700 py-3">{total}을 {denominator}로 똑같이 나눌 수 없어요. 다른 수를 골라보세요.</p>
              )}
            </div>
            <div className="bg-white rounded-xl p-3 space-y-2">
              <div>
                <div className="flex items-center justify-between mb-1.5"><label className="text-xs font-semibold text-slate-700">사탕 개수</label><span className="text-xs font-bold text-purple-700">{total}개</span></div>
                <input type="range" min="4" max="24" step="1" value={total} onChange={e => { setTotal(parseInt(e.target.value)); setPicked(0); }} className="w-full accent-purple-500" />
              </div>
              <div>
                <div className="flex items-center justify-between mb-1.5"><label className="text-xs font-semibold text-slate-700">몇 묶음으로?</label><span className="text-xs font-bold text-purple-700">{denominator}묶음</span></div>
                <input type="range" min="2" max="6" value={denominator} onChange={e => { setDenominator(parseInt(e.target.value)); setPicked(0); }} className="w-full accent-purple-500" />
              </div>
              <p className="text-xs text-slate-500 mt-1">💡 사탕을 톡톡 눌러 묶음을 골라보세요</p>
            </div>
          </div>
        );
      };

      // 3차시: 🔄 부분 → 분수 맞히기 — 게임 모드
      const ReverseFraction = () => {
        const [total, setTotal] = useState(12);
        const [groupSize, setGroupSize] = useState(3);
        const [highlightCount, setHighlightCount] = useState(0);
        const [guessNum, setGuessNum] = useState(1);
        const groups = total / groupSize;
        const isValid = total % groupSize === 0;
        const correctNum = highlightCount / groupSize;
        const isCorrect = guessNum === correctNum && highlightCount > 0;

        const newChallenge = () => {
          const t = [6, 8, 9, 10, 12, 14, 15, 16, 18, 20][Math.floor(Math.random() * 10)];
          const divs = [];
          for (let i = 2; i <= Math.min(6, t / 2); i++) if (t % i === 0) divs.push(t / i);
          const gs = divs[Math.floor(Math.random() * divs.length)];
          const newGroups = t / gs;
          const hc = (1 + Math.floor(Math.random() * (newGroups - 1))) * gs;
          setTotal(t); setGroupSize(gs); setHighlightCount(hc); setGuessNum(1);
        };

        React.useEffect(() => { newChallenge(); }, []);

        return (
          <div className="space-y-3">
            <div className={`bg-gradient-to-br rounded-xl p-4 ${isCorrect ? 'from-emerald-50 to-teal-50 glow' : 'from-amber-50 to-orange-50'}`}>
              <div className="flex items-center justify-between mb-2 flex-wrap gap-1">
                <span className="inline-block bg-white px-3 py-1 rounded-full text-xs font-semibold text-amber-700 border border-amber-200">
                  🎯 초록 사탕은 전체의 얼마일까?
                </span>
                <button onClick={newChallenge} className="text-xs bg-white border border-slate-200 hover:bg-slate-50 px-2.5 py-1 rounded-full font-medium text-slate-600">🎲 새 문제</button>
              </div>
              {isValid && (
                <>
                  <div className="flex flex-wrap gap-1 justify-center my-3 max-w-xs mx-auto">
                    {Array.from({ length: total }, (_, i) => {
                      const isHi = i < highlightCount;
                      return <div key={i} className={`w-7 h-7 rounded-full ${isHi ? 'bg-emerald-500 shadow-md' : 'bg-slate-300'} ${(i + 1) % groupSize === 0 ? 'mr-2' : ''}`} />;
                    })}
                  </div>
                  <p className="text-center text-xs text-slate-600">{total}개를 {groupSize}개씩 묶었어요. 초록 사탕은 <strong>{highlightCount}개</strong>.</p>
                </>
              )}
              <div className="mt-3 bg-white rounded-lg p-3">
                <p className="text-xs text-slate-600 mb-2 text-center">내 답:</p>
                <div className="flex items-center justify-center gap-3">
                  <div className="inline-flex flex-col items-center">
                    <button onClick={() => setGuessNum(Math.min(groups, guessNum + 1))} className="w-7 h-7 rounded bg-emerald-100 hover:bg-emerald-200 text-emerald-700 font-bold">▲</button>
                    <span className="text-2xl font-black text-emerald-600 my-1 w-8 text-center">{guessNum}</span>
                    <button onClick={() => setGuessNum(Math.max(1, guessNum - 1))} className="w-7 h-7 rounded bg-emerald-100 hover:bg-emerald-200 text-emerald-700 font-bold">▼</button>
                  </div>
                  <div className="h-0.5 w-8 bg-slate-900"></div>
                  <span className="text-2xl font-black text-slate-900">{groups}</span>
                </div>
                {isCorrect && <p className="text-center text-emerald-700 font-bold text-sm mt-2 pop-in">🎉 정답! {highlightCount}개는 {total}개의 {correctNum}/{groups}!</p>}
                {!isCorrect && guessNum !== 1 && highlightCount > 0 && (
                  <p className="text-center text-slate-500 text-xs mt-2">💭 묶음을 세어볼까요?</p>
                )}
              </div>
            </div>
          </div>
        );
      };

      // 4차시: ⚖️ 진분수/가분수 분류 — 드래그 분류 게임
      const ProperImproper = () => {
        const [cards, setCards] = useState([
          { id: 1, n: 2, d: 5, placed: null },
          { id: 2, n: 5, d: 3, placed: null },
          { id: 3, n: 3, d: 7, placed: null },
          { id: 4, n: 4, d: 4, placed: null },
          { id: 5, n: 7, d: 2, placed: null },
          { id: 6, n: 1, d: 6, placed: null },
        ]);
        const [dragId, setDragId] = useState(null);
        const [overZone, setOverZone] = useState(null);

        const place = (cardId, zone) => {
          setCards(prev => prev.map(c => c.id === cardId ? { ...c, placed: zone } : c));
        };

        const reset = () => setCards(prev => prev.map(c => ({ ...c, placed: null })));

        const allDone = cards.every(c => c.placed !== null);
        const correct = cards.filter(c => {
          if (c.placed === null) return false;
          const isProper = c.n < c.d;
          return (c.placed === 'proper' && isProper) || (c.placed === 'improper' && !isProper);
        }).length;

        const Card = ({ card }) => (
          <button
            draggable
            onDragStart={() => setDragId(card.id)}
            onDragEnd={() => setDragId(null)}
            onClick={() => {
              // 모바일 대안: 클릭하면 자동으로 올바른 칸으로
              const isProper = card.n < card.d;
              place(card.id, isProper ? 'proper' : 'improper');
            }}
            className="draggable bg-white border-2 border-slate-300 hover:border-indigo-400 rounded-lg px-3 py-2 inline-flex flex-col items-center shadow-sm hover:shadow-md transition-all"
          >
            <span className="text-lg font-black text-slate-900">{card.n}</span>
            <div className="h-0.5 w-5 bg-slate-900"></div>
            <span className="text-lg font-black text-slate-900">{card.d}</span>
          </button>
        );

        const DropZone = ({ zone, label, color, emoji }) => {
          const inZone = cards.filter(c => c.placed === zone);
          return (
            <div
              className={`drop-zone flex-1 border-2 border-dashed rounded-xl p-3 min-h-[110px] ${overZone === zone ? 'over' : ''}`}
              style={{ borderColor: color, backgroundColor: color + '15' }}
              onDragOver={e => { e.preventDefault(); setOverZone(zone); }}
              onDragLeave={() => setOverZone(null)}
              onDrop={() => { if (dragId) place(dragId, zone); setOverZone(null); }}
            >
              <p className="text-xs font-bold mb-2 text-center" style={{ color }}>{emoji} {label}</p>
              <div className="flex flex-wrap gap-1.5 justify-center">
                {inZone.map(c => <Card key={c.id} card={c} />)}
                {inZone.length === 0 && <p className="text-[10px] text-slate-400 italic">여기로 끌어와요</p>}
              </div>
            </div>
          );
        };

        return (
          <div className="space-y-3">
            <div className="bg-gradient-to-br from-indigo-50 to-purple-50 rounded-xl p-4">
              <div className="flex items-center justify-between mb-2 flex-wrap gap-1">
                <span className="text-xs font-semibold text-indigo-700">🎯 분수 카드를 알맞은 곳으로 끌어다 놓아요</span>
                <button onClick={reset} className="text-xs bg-white border border-slate-200 hover:bg-slate-50 px-2.5 py-1 rounded-full font-medium text-slate-600">🔄 다시</button>
              </div>
              {/* 미배치 카드 */}
              <div className="bg-white/70 rounded-lg p-2.5 mb-3 min-h-[60px]">
                <p className="text-[10px] font-semibold text-slate-500 mb-1.5 text-center">📦 분류할 카드들</p>
                <div className="flex flex-wrap gap-1.5 justify-center">
                  {cards.filter(c => c.placed === null).map(c => <Card key={c.id} card={c} />)}
                  {cards.filter(c => c.placed === null).length === 0 && <p className="text-[10px] text-emerald-600 font-semibold py-1">✓ 모두 분류했어요!</p>}
                </div>
              </div>
              {/* 드롭존 */}
              <div className="flex gap-2">
                <DropZone zone="proper" label="진분수 (1보다 작음)" color="#3b82f6" emoji="🐣" />
                <DropZone zone="improper" label="가분수 (1과 같거나 큼)" color="#f59e0b" emoji="🦅" />
              </div>
              {allDone && (
                <div className={`mt-3 text-center py-2 rounded-lg pop-in ${correct === 6 ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}`}>
                  <p className="font-bold text-sm">{correct === 6 ? '🎉 완벽해요! 모두 정답!' : `${correct}/6 정답 — 다시 도전해볼까요?`}</p>
                </div>
              )}
            </div>
            <p className="text-xs text-slate-500 px-1">💡 카드를 끌어 옮기거나, 톡 누르면 자동으로 분류돼요</p>
          </div>
        );
      };

      // 5차시: 🧱 대분수 블록 쌓기 — 막대 그래프로 보는 자연수+진분수
      const MixedNumber = () => {
        const [whole, setWhole] = useState(2);
        const [denominator, setDenominator] = useState(4);
        const [numerator, setNumerator] = useState(3);
        const [celebrate, setCelebrate] = useState(false);
        const bumpFill = (i) => {
          if (i < numerator) setNumerator(i);
          else setNumerator(i + 1);
          setCelebrate(true);
          setTimeout(() => setCelebrate(false), 300);
        };
        return (
          <div className="space-y-3">
            <div className="bg-gradient-to-br from-emerald-50 to-teal-50 rounded-xl p-4">
              <p className="text-xs font-semibold text-emerald-700 mb-2 text-center">🧱 자연수 + 진분수 = 대분수</p>
              {/* 자연수 부분 (꽉 찬 블록) */}
              <div className="space-y-1.5 mb-2">
                {Array.from({ length: whole }, (_, i) => (
                  <div key={`w-${i}`} className="flex gap-1 items-center fade-in">
                    <span className="text-[10px] font-bold text-emerald-700 w-6">{i + 1}</span>
                    <div className="flex gap-0.5 flex-1">
                      {Array.from({ length: denominator }, (_, j) => (
                        <div key={j} className="flex-1 h-7 border-2 border-emerald-700 rounded bg-emerald-500" />
                      ))}
                    </div>
                  </div>
                ))}
                {/* 진분수 부분 (클릭 가능) */}
                <div className="flex gap-1 items-center">
                  <span className="text-[10px] font-bold text-amber-700 w-6">+</span>
                  <div className="flex gap-0.5 flex-1">
                    {Array.from({ length: denominator }, (_, j) => (
                      <button
                        key={j}
                        onClick={() => bumpFill(j)}
                        className={`flex-1 h-7 border-2 border-amber-700 rounded hover:opacity-80 transition-all ${j < numerator ? `bg-amber-500 ${celebrate ? 'wiggle' : ''}` : 'bg-slate-100'}`}
                      />
                    ))}
                  </div>
                </div>
              </div>
              {/* 결과 */}
              <div className="bg-white rounded-lg p-3 text-center">
                <div className="flex items-center justify-center gap-2">
                  <span className="text-3xl font-black text-emerald-600">{whole}</span>
                  <span className="text-xs text-slate-500">과</span>
                  <div className="inline-flex flex-col items-center">
                    <span className="text-xl font-black text-amber-600">{numerator}</span>
                    <div className="h-0.5 w-5 bg-slate-900"></div>
                    <span className="text-xl font-black text-amber-600">{denominator}</span>
                  </div>
                </div>
                <p className="text-[10px] text-slate-500 mt-1">자연수 <span className="text-emerald-600 font-bold">{whole}</span>과 진분수 <span className="text-amber-600 font-bold">{numerator}/{denominator}</span></p>
              </div>
            </div>
            <div className="bg-white rounded-xl p-3 space-y-2">
              <div>
                <div className="flex items-center justify-between mb-1.5"><label className="text-xs font-semibold text-emerald-700">🟩 자연수</label><span className="text-xs font-bold text-emerald-700">{whole}</span></div>
                <input type="range" min="1" max="4" value={whole} onChange={e => setWhole(parseInt(e.target.value))} className="w-full accent-emerald-500" />
              </div>
              <div>
                <div className="flex items-center justify-between mb-1.5"><label className="text-xs font-semibold text-slate-700">🍰 분모</label><span className="text-xs font-bold text-slate-700">{denominator}</span></div>
                <input type="range" min="2" max="8" value={denominator} onChange={e => { setDenominator(parseInt(e.target.value)); if (numerator >= parseInt(e.target.value)) setNumerator(parseInt(e.target.value) - 1); }} className="w-full accent-slate-500" />
              </div>
              <p className="text-xs text-slate-500">💡 노란 블록을 톡 눌러 진분수 부분을 만드세요</p>
            </div>
          </div>
        );
      };

      // 6차시: 🔁 대분수 ↔ 가분수 변환 — 양방향 전환 + 시각화
      const Convert = () => {
        const [denominator, setDenominator] = useState(3);
        const [improperNum, setImproperNum] = useState(7);
        const [direction, setDirection] = useState('toMixed'); // 'toMixed' or 'toImproper'
        const whole = Math.floor(improperNum / denominator);
        const remainder = improperNum % denominator;
        return (
          <div className="space-y-3">
            {/* 방향 토글 */}
            <div className="bg-white rounded-xl p-1 flex gap-1">
              <button
                onClick={() => setDirection('toMixed')}
                className={`flex-1 py-1.5 rounded-lg text-xs font-bold transition-all ${direction === 'toMixed' ? 'bg-slate-900 text-white shadow' : 'text-slate-500 hover:bg-slate-50'}`}
              >가분수 → 대분수</button>
              <button
                onClick={() => setDirection('toImproper')}
                className={`flex-1 py-1.5 rounded-lg text-xs font-bold transition-all ${direction === 'toImproper' ? 'bg-slate-900 text-white shadow' : 'text-slate-500 hover:bg-slate-50'}`}
              >대분수 → 가분수</button>
            </div>

            <div className="bg-gradient-to-br from-violet-50 to-pink-50 rounded-xl p-4">
              {/* 시각화: 막대를 분모 단위로 채움 */}
              <div className="space-y-1 mb-3">
                {Array.from({ length: whole }, (_, i) => (
                  <div key={`w-${i}`} className="flex gap-0.5 fade-in">
                    {Array.from({ length: denominator }, (_, j) => (
                      <div key={j} className="flex-1 h-6 border border-emerald-700 rounded bg-emerald-500" />
                    ))}
                  </div>
                ))}
                {remainder > 0 && (
                  <div className="flex gap-0.5 fade-in">
                    {Array.from({ length: denominator }, (_, j) => (
                      <div key={j} className={`flex-1 h-6 border rounded ${j < remainder ? 'border-amber-700 bg-amber-500' : 'border-slate-300 bg-slate-100'}`} />
                    ))}
                  </div>
                )}
              </div>

              {/* 변환식 */}
              <div className="bg-slate-900 text-white rounded-lg p-3 space-y-2">
                {direction === 'toMixed' ? (
                  <>
                    <div className="flex items-center justify-between">
                      <span className="text-[10px] text-slate-400">가분수</span>
                      <div className="inline-flex flex-col items-center">
                        <span className="text-xl font-black text-violet-300">{improperNum}</span>
                        <div className="h-0.5 w-6 bg-white"></div>
                        <span className="text-xl font-black text-violet-300">{denominator}</span>
                      </div>
                    </div>
                    <div className="text-center text-emerald-300 text-xs font-mono py-1 border-y border-slate-700">
                      {improperNum} ÷ {denominator} = {whole} 나머지 {remainder}
                    </div>
                    <div className="flex items-center justify-between">
                      <span className="text-[10px] text-slate-400">대분수</span>
                      <div className="flex items-center gap-1.5">
                        {whole > 0 && <span className="text-xl font-black text-pink-300">{whole}</span>}
                        {remainder > 0 && (<>
                          {whole > 0 && <span className="text-[10px] text-slate-400">과</span>}
                          <div className="inline-flex flex-col items-center">
                            <span className="text-xl font-black text-pink-300">{remainder}</span>
                            <div className="h-0.5 w-6 bg-white"></div>
                            <span className="text-xl font-black text-pink-300">{denominator}</span>
                          </div>
                        </>)}
                        {remainder === 0 && <span className="text-[10px] text-slate-400">(딱 떨어짐)</span>}
                      </div>
                    </div>
                  </>
                ) : (
                  <>
                    <div className="flex items-center justify-between">
                      <span className="text-[10px] text-slate-400">대분수</span>
                      <div className="flex items-center gap-1.5">
                        <span className="text-xl font-black text-pink-300">{whole}</span>
                        <span className="text-[10px] text-slate-400">과</span>
                        <div className="inline-flex flex-col items-center">
                          <span className="text-xl font-black text-pink-300">{remainder}</span>
                          <div className="h-0.5 w-6 bg-white"></div>
                          <span className="text-xl font-black text-pink-300">{denominator}</span>
                        </div>
                      </div>
                    </div>
                    <div className="text-center text-emerald-300 text-xs font-mono py-1 border-y border-slate-700">
                      {whole} × {denominator} + {remainder} = {improperNum}
                    </div>
                    <div className="flex items-center justify-between">
                      <span className="text-[10px] text-slate-400">가분수</span>
                      <div className="inline-flex flex-col items-center">
                        <span className="text-xl font-black text-violet-300">{improperNum}</span>
                        <div className="h-0.5 w-6 bg-white"></div>
                        <span className="text-xl font-black text-violet-300">{denominator}</span>
                      </div>
                    </div>
                  </>
                )}
              </div>
              <p className="text-center text-[10px] text-slate-500 mt-2">💡 양은 똑같아요 — 표현 방식만 달라요!</p>
            </div>

            <div className="bg-white rounded-xl p-3 space-y-2">
              <div>
                <div className="flex items-center justify-between mb-1.5"><label className="text-xs font-semibold text-slate-700">분모</label><span className="text-xs font-bold text-violet-700">{denominator}</span></div>
                <input type="range" min="2" max="8" value={denominator} onChange={e => { const v = parseInt(e.target.value); setDenominator(v); if (improperNum < v) setImproperNum(v); }} className="w-full accent-violet-500" />
              </div>
              <div>
                <div className="flex items-center justify-between mb-1.5"><label className="text-xs font-semibold text-slate-700">가분수의 분자</label><span className="text-xs font-bold text-violet-700">{improperNum}</span></div>
                <input type="range" min={denominator} max={denominator * 5} value={improperNum} onChange={e => setImproperNum(parseInt(e.target.value))} className="w-full accent-violet-500" />
              </div>
            </div>
          </div>
        );
      };

      // 7차시: 📊 분수 크기 비교 — 두 막대 즉시 비교 + 도전 모드
      const Compare = () => {
        const [n1, setN1] = useState(3); const [d1, setD1] = useState(5);
        const [n2, setN2] = useState(2); const [d2, setD2] = useState(5);
        const [streak, setStreak] = useState(0);
        const [challenge, setChallenge] = useState(false);
        const [feedback, setFeedback] = useState(null);

        const v1 = n1 / d1, v2 = n2 / d2;
        const sign = v1 > v2 ? '>' : v1 < v2 ? '<' : '=';

        const askChallenge = () => {
          const d = [2,3,4,5,6,7,8][Math.floor(Math.random()*7)];
          const a = 1 + Math.floor(Math.random()*(d-1));
          let b = 1 + Math.floor(Math.random()*(d-1));
          while (b === a) b = 1 + Math.floor(Math.random()*(d-1));
          setN1(a); setD1(d); setN2(b); setD2(d);
          setChallenge(true);
          setFeedback(null);
        };

        const guess = (g) => {
          if (g === sign) {
            setStreak(streak + 1);
            setFeedback({ ok: true, msg: `🎉 정답! (${streak + 1}연속)` });
            setTimeout(() => { setFeedback(null); askChallenge(); }, 1500);
          } else {
            setStreak(0);
            setFeedback({ ok: false, msg: `💪 다시 — 막대 길이를 보세요!` });
            setTimeout(() => setFeedback(null), 1500);
          }
        };

        return (
          <div className="space-y-3">
            <div className="bg-gradient-to-br from-blue-50 to-cyan-50 rounded-xl p-4">
              <div className="flex items-center justify-between mb-2">
                <p className="text-xs font-semibold text-blue-700">📊 어느 쪽이 더 클까?</p>
                <div className="flex gap-1.5">
                  {streak > 0 && <span className="bg-amber-100 text-amber-700 text-[10px] font-bold px-2 py-0.5 rounded-full">🔥 {streak}연속</span>}
                  <button onClick={askChallenge} className="text-xs bg-white border border-slate-200 hover:bg-slate-50 px-2.5 py-1 rounded-full font-medium text-slate-600">🎲 도전!</button>
                </div>
              </div>

              <div className="space-y-3 mb-3">
                <div>
                  <p className="text-[10px] text-emerald-700 font-semibold mb-1">A: {n1}/{d1}</p>
                  <div className="flex gap-0.5 h-8">
                    {Array.from({ length: d1 }, (_, i) => (
                      <div key={i} className={`flex-1 border border-emerald-700 rounded ${i < n1 ? 'bg-emerald-500' : 'bg-white'} transition-all`} />
                    ))}
                  </div>
                </div>
                <div>
                  <p className="text-[10px] text-blue-700 font-semibold mb-1">B: {n2}/{d2}</p>
                  <div className="flex gap-0.5 h-8">
                    {Array.from({ length: d2 }, (_, i) => (
                      <div key={i} className={`flex-1 border border-blue-700 rounded ${i < n2 ? 'bg-blue-500' : 'bg-white'} transition-all`} />
                    ))}
                  </div>
                </div>
              </div>

              {challenge ? (
                <div className="bg-white rounded-lg p-3">
                  <p className="text-xs text-center text-slate-600 mb-2">A □ B</p>
                  <div className="grid grid-cols-3 gap-2">
                    {['>','=','<'].map(s => (
                      <button key={s} onClick={() => guess(s)} className="bg-slate-100 hover:bg-slate-900 hover:text-white py-2.5 rounded-lg text-2xl font-black transition-all">{s}</button>
                    ))}
                  </div>
                  {feedback && <p className={`text-center text-sm font-bold mt-2 pop-in ${feedback.ok ? 'text-emerald-700' : 'text-red-700'}`}>{feedback.msg}</p>}
                </div>
              ) : (
                <div className="bg-slate-900 text-white rounded-lg p-3 flex items-center justify-center gap-4">
                  <div className="inline-flex flex-col items-center"><span className="font-black text-xl text-emerald-300">{n1}</span><div className="h-0.5 w-5 bg-emerald-300"></div><span className="font-black text-xl text-emerald-300">{d1}</span></div>
                  <span className="font-black text-4xl">{sign}</span>
                  <div className="inline-flex flex-col items-center"><span className="font-black text-xl text-blue-300">{n2}</span><div className="h-0.5 w-5 bg-blue-300"></div><span className="font-black text-xl text-blue-300">{d2}</span></div>
                </div>
              )}
            </div>

            {!challenge && (
              <div className="bg-white rounded-xl p-3 grid grid-cols-2 gap-3">
                <div>
                  <p className="text-[10px] font-bold text-emerald-700 mb-1.5">분수 A</p>
                  <div className="flex items-center gap-1.5 mb-1.5">
                    <span className="text-[10px] text-slate-500 w-8">분자</span>
                    <input type="range" min="1" max={d1} value={n1} onChange={e => setN1(parseInt(e.target.value))} className="flex-1 accent-emerald-500" />
                    <span className="text-xs font-bold w-4">{n1}</span>
                  </div>
                  <div className="flex items-center gap-1.5">
                    <span className="text-[10px] text-slate-500 w-8">분모</span>
                    <input type="range" min="2" max="9" value={d1} onChange={e => { const v = parseInt(e.target.value); setD1(v); if (n1 > v) setN1(v); }} className="flex-1 accent-emerald-500" />
                    <span className="text-xs font-bold w-4">{d1}</span>
                  </div>
                </div>
                <div>
                  <p className="text-[10px] font-bold text-blue-700 mb-1.5">분수 B</p>
                  <div className="flex items-center gap-1.5 mb-1.5">
                    <span className="text-[10px] text-slate-500 w-8">분자</span>
                    <input type="range" min="1" max={d2} value={n2} onChange={e => setN2(parseInt(e.target.value))} className="flex-1 accent-blue-500" />
                    <span className="text-xs font-bold w-4">{n2}</span>
                  </div>
                  <div className="flex items-center gap-1.5">
                    <span className="text-[10px] text-slate-500 w-8">분모</span>
                    <input type="range" min="2" max="9" value={d2} onChange={e => { const v = parseInt(e.target.value); setD2(v); if (n2 > v) setN2(v); }} className="flex-1 accent-blue-500" />
                    <span className="text-xs font-bold w-4">{d2}</span>
                  </div>
                </div>
              </div>
            )}
            {challenge && <button onClick={() => setChallenge(false)} className="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs py-2 rounded-lg font-medium">↩️ 자유 탐구 모드로 돌아가기</button>}
          </div>
        );
      };

      const renderManipulative = (type) => {
        switch (type) {
          case 'pizza': return <PizzaSlice />;
          case 'fraction-builder': return <FractionBuilder />;
          case 'equal-share': return <EqualShare />;
          case 'candy-group': return <CandyGroup />;
          case 'reverse-fraction': return <ReverseFraction />;
          case 'proper-improper': return <ProperImproper />;
          case 'mixed-number': return <MixedNumber />;
          case 'convert': return <Convert />;
          case 'compare': return <Compare />;
          default: return null;
        }
      };

      // ===== 호출 모달 =====
      const renderCallModal = () => {
        if (!showCallModal) return null;
        if (callStatus) {
          return (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-2xl max-w-md w-full p-6 slide-up">
                <div className="text-center mb-4">
                  <div className="w-16 h-16 bg-red-500 rounded-full mx-auto mb-3 flex items-center justify-center pulse-ring"><Bell className="w-8 h-8 text-white" /></div>
                  <h3 className="text-xl font-bold text-slate-900 mb-1">선생님께 호출 요청을 보냈어요</h3>
                  <p className="text-sm text-slate-500">잠시만 기다려주세요</p>
                </div>
                <div className="bg-slate-50 rounded-xl p-4 space-y-2 mb-4">
                  <div className="flex items-start gap-3"><span className="text-xl">{callStatus.type.icon}</span><div className="flex-1"><p className="text-sm font-semibold text-slate-900">{callStatus.type.label}</p><p className="text-xs text-slate-500 mt-0.5">{callStatus.type.description}</p></div></div>
                  <div className="border-t border-slate-200 pt-2 mt-2 space-y-1 text-xs">
                    <div className="flex justify-between"><span className="text-slate-500">위치</span><span className="font-medium text-slate-700">{callStatus.location}</span></div>
                    <div className="flex justify-between"><span className="text-slate-500">시간</span><span className="font-medium text-slate-700">{callStatus.time}</span></div>
                  </div>
                </div>
                <div className="bg-emerald-50 border border-emerald-100 rounded-lg p-3 text-center"><p className="text-xs font-semibold text-emerald-700 mb-0.5">잘했어요!</p><p className="text-xs text-emerald-600">막힌 곳을 알아차리는 것이 진짜 공부예요</p></div>
                <p className="text-center text-xs text-slate-400 mt-3">5초 후 자동으로 닫혀요</p>
              </div>
            </div>
          );
        }
        return (
          <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
            <div className="bg-white rounded-2xl max-w-md w-full max-h-[90vh] overflow-y-auto slide-up">
              <div className="p-6">
                <div className="flex items-start justify-between mb-4">
                  <div><h3 className="text-xl font-bold text-slate-900 mb-1">선생님 호출하기</h3><p className="text-sm text-slate-500">어디가 어려운지 알려주세요</p></div>
                  <button onClick={() => setShowCallModal(false)} className="w-8 h-8 rounded-lg bg-slate-100 hover:bg-slate-200 flex items-center justify-center flex-shrink-0"><X className="w-4 h-4 text-slate-600" /></button>
                </div>
                <div className="space-y-2">
                  {callTypes.map((type) => (
                    <button key={type.id} onClick={() => handleCall(type.id)} className="w-full text-left bg-white border border-slate-200 hover:border-slate-900 hover:shadow-md rounded-xl p-4 transition-all group">
                      <div className="flex items-start gap-3"><span className="text-2xl flex-shrink-0">{type.icon}</span><div className="flex-1 min-w-0"><h4 className="font-semibold text-slate-900 mb-0.5">{type.label}</h4><p className="text-xs text-slate-500">{type.description}</p></div><ArrowRight className="w-4 h-4 text-slate-300 group-hover:text-slate-900 group-hover:translate-x-1 transition-all flex-shrink-0 mt-1" /></div>
                    </button>
                  ))}
                </div>
                <div className="mt-4 bg-amber-50 border border-amber-100 rounded-lg p-3"><p className="text-xs text-amber-800 leading-relaxed"><span className="font-semibold">호출은 부끄러운 게 아니에요!</span><br />내가 어디서 막혔는지 알아차리는 것이 진짜 공부예요.</p></div>
              </div>
            </div>
          </div>
        );
      };

      const renderCallButton = () => {
        if (mode === 'teacher' || view === 'home') return null;
        return (<button onClick={() => setShowCallModal(true)} className="fixed bottom-6 right-6 w-14 h-14 bg-red-500 hover:bg-red-600 text-white rounded-full shadow-lg shadow-red-200 flex items-center justify-center z-40 transition-all hover:scale-105"><HelpCircle className="w-7 h-7" /></button>);
      };

      // ===== 화면들 =====
      const renderHome = () => (
        <div className="space-y-8">
          <div>
            <div className="flex items-center gap-2 mb-3">
              <div className="h-px w-8 bg-slate-300" />
              <p className="text-xs font-semibold tracking-[0.2em] text-slate-500">N-PROTOCOL</p>
            </div>
            <h1 className="text-4xl font-bold text-slate-900 tracking-tight mb-2">분수</h1>
            <p className="text-slate-500">3학년 2학기 · 5단원</p>
          </div>

          <div className="rounded-2xl bg-white border border-slate-200 p-6">
            <div className="flex items-center justify-between mb-4">
              <div className="flex items-center gap-2"><TrendingUp className="w-4 h-4 text-emerald-600" /><h3 className="text-sm font-semibold text-slate-900">나의 학습 진도</h3></div>
              <span className="text-xs font-semibold text-slate-500">{completedCount} / {lessons.length} 차시 완료</span>
            </div>
            <div className="mb-4">
              <div className="flex items-baseline gap-2 mb-2"><span className="text-3xl font-bold text-emerald-600">{progressPercent}%</span><span className="text-xs text-slate-500">완료</span></div>
              <div className="h-3 bg-slate-100 rounded-full overflow-hidden">
                <div className="h-full bg-gradient-to-r from-emerald-400 to-emerald-600 rounded-full transition-all duration-500" style={{ width: `${progressPercent}%` }} />
              </div>
            </div>
            <div className="grid grid-cols-3 gap-2 text-center">
              <div className="bg-emerald-50 rounded-lg p-2"><div className="text-lg font-bold text-emerald-700">{completedCount}</div><div className="text-xs text-emerald-600">완료</div></div>
              <div className="bg-amber-50 rounded-lg p-2"><div className="text-lg font-bold text-amber-700">{inProgressCount}</div><div className="text-xs text-amber-600">도전중</div></div>
              <div className="bg-slate-100 rounded-lg p-2"><div className="text-lg font-bold text-slate-700">{lessons.length - completedCount - inProgressCount}</div><div className="text-xs text-slate-500">시작전</div></div>
            </div>
          </div>

          <button onClick={() => setView('prerequisite')} className="w-full group relative overflow-hidden rounded-2xl bg-gradient-to-br from-emerald-50 to-teal-50 border border-emerald-100 p-6 text-left hover:shadow-lg hover:shadow-emerald-100/50 transition-all duration-300">
            <div className="flex items-start gap-4">
              <div className="flex-shrink-0 w-12 h-12 rounded-xl bg-emerald-500 flex items-center justify-center text-white shadow-md shadow-emerald-200"><Sprout className="w-6 h-6" /></div>
              <div className="flex-1"><p className="text-xs font-semibold tracking-wider text-emerald-700 mb-1">단원 시작 전</p><h3 className="text-lg font-bold text-slate-900 mb-1.5">먼저 알아야 할 개념들</h3><p className="text-sm text-slate-600 leading-relaxed">사전 진단에서 부족한 부분이 있다면 여기부터 시작하세요</p></div>
              <ArrowRight className="w-5 h-5 text-emerald-600 mt-2 group-hover:translate-x-1 transition-transform" />
            </div>
          </button>

          <div>
            <div className="flex items-center gap-2 mb-4"><h3 className="text-sm font-semibold text-slate-700">차시별 핵심 개념</h3><div className="h-px flex-1 bg-slate-200" /><span className="text-xs text-slate-400">{lessons.length}개 차시</span></div>
            <div className="grid gap-2.5">
              {lessons.map((lesson) => {
                const status = getLessonStatus(lesson.id);
                return (
                  <button key={lesson.id} onClick={() => { setCurrentLesson(lesson); markVisited(lesson.id); setView('lesson'); }} className="w-full group relative bg-white border border-slate-200 rounded-xl p-4 text-left hover:border-slate-900 hover:shadow-md transition-all duration-200">
                    <div className="flex items-center gap-4">
                      <div className={`flex-shrink-0 w-12 h-12 rounded-lg flex items-center justify-center transition-colors ${status === 'completed' ? 'bg-emerald-500 text-white' : status === 'in-progress' ? 'bg-amber-100 text-amber-700' : 'bg-slate-100 group-hover:bg-slate-900 text-slate-700 group-hover:text-white'}`}>
                        {status === 'completed' ? <Check className="w-5 h-5" /> : <span className="text-xs font-bold">{lesson.number}</span>}
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2 mb-0.5">
                          <h4 className="font-semibold text-slate-900 truncate">{lesson.title}</h4>
                          {status === 'in-progress' && <span className="text-xs bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded-md flex-shrink-0">도전중</span>}
                          {status === 'completed' && <span className="text-xs bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded-md flex-shrink-0">완료</span>}
                        </div>
                        <p className="text-sm text-slate-500 truncate">{lesson.coreLearning}</p>
                      </div>
                      <ArrowRight className="w-4 h-4 text-slate-300 group-hover:text-slate-900 group-hover:translate-x-1 transition-all flex-shrink-0" />
                    </div>
                  </button>
                );
              })}
            </div>
          </div>

          <div className="rounded-2xl bg-gradient-to-br from-rose-50 to-red-50 border border-rose-100 p-5">
            <div className="flex items-start gap-3">
              <div className="flex-shrink-0 w-10 h-10 rounded-lg bg-red-500 flex items-center justify-center text-white"><HelpCircle className="w-5 h-5" /></div>
              <div className="flex-1"><h4 className="font-bold text-slate-900 mb-1 text-sm">막히면 선생님을 호출하세요</h4><p className="text-xs text-slate-600 leading-relaxed mb-2">학습 중에 화면 오른쪽 아래에 빨간 버튼이 있어요. 눌러서 어디가 어려운지 알려주면 선생님이 도와드려요.</p></div>
            </div>
          </div>

          <div className="pt-6 border-t border-slate-100"><p className="text-xs text-slate-400 text-center">능동초등학교 · N-Protocol 연구</p></div>
        </div>
      );

      const renderPrerequisite = () => (
        <div className="space-y-6">

                              className="w-full bg-white hover:bg-emerald-50 border-2 border-emerald-300 hover:border-emerald-500 rounded-xl px-4 py-3 text-left transition-all group shadow-sm hover:shadow"

                          </div>

                          {currentLesson.fallbackChain.tier3 && currentLesson.fallbackChain.tier3.length > 0 ? (

                                  </div>
                                  {item.subTitle && <p className="text-xs text-slate-600 ml-1 mb-2">📖 {item.subTitle}</p>}
                                  <div className="bg-orange-50 border border-orange-200 rounded-lg px-3 py-2">
                                    <p className="text-xs text-orange-800 leading-relaxed"><span className="font-bold">💡 왜 도움되냐면 </span>{item.why}</p>

                        <div className="flex-shrink-0 w-12 h-12 rounded-full bg-rose-500 text-white flex items-center justify-center font-black text-xl shadow-lg">4</div>
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center gap-2 mb-1">
                            <span className="text-2xl">💪</span>
                            <h4 className="text-base font-black text-rose-900">예전에 배운 걸 다시 떠올려요!</h4>
                          </div>
                          <p className="text-sm text-rose-700 mb-3">지난 학년에 배웠던 거 기억나죠?</p>
                          {currentLesson.fallbackChain.tier4 && currentLesson.fallbackChain.tier4.length > 0 ? (
                            <div className="space-y-2">
                              {currentLesson.fallbackChain.tier4.map((item, idx) => (
                                <div key={idx} className="bg-white border-2 border-rose-200 rounded-xl px-4 py-3">
                                  <div className="flex items-center gap-2 mb-1.5">
                                    <span className="bg-rose-500 text-white text-xs font-black px-2.5 py-1 rounded-lg">{item.unit} {item.no}</span>
                                    <span className="text-sm font-bold text-slate-800">{item.title}</span>
                                  </div>
                                  {item.subTitle && <p className="text-xs text-slate-600 ml-1 mb-2">📖 {item.subTitle}</p>}
                                  <div className="bg-rose-50 border border-rose-200 rounded-lg px-3 py-2">

                                  </div>

                              ))}

                {/* 응원 메시지 */}

                {currentLesson.prerequisite && currentLesson.prerequisite.length > 0 && (

                      ))}

                  </div>
                )}
