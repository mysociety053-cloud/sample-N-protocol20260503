            )}
          </div>
        );
      };

      // ===== 인쇄용 성장 이음 리포트 렌더링 =====
      const renderPrintableReports = () => {
        if (!printTargets || printTargets.length === 0) return null;

        const lessonByIdMap = Object.fromEntries(lessons.map(l => [l.id, l]));
        const lessonOrder = ['intro','lesson1','lesson2','lesson3','lesson4','lesson5','lesson6','lesson7'];
        const totalLessons = lessonOrder.length;
        const today = new Date().toISOString().slice(0,10).replace(/-/g,'.');

        const renderOne = (stuId) => {
          const stu = studentRoster.find(s => s.id === stuId);
          if (!stu) return null;
          const prog = studentProgressData[stuId];
          const passed = Object.values(prog).filter(v=>v==='pass').length;
          const progPct = Math.round((passed/totalLessons)*100);
          const gms = gmsHistory[stuId];
          const realUnit = gms.find(g => !g.isVirtual) || gms[gms.length-1];
          const quiz = quizSummary[stuId];
          const stuFallbacks = fallbackMoves.filter(m => m.studentId === stuId);
          const stuCalls = calls.filter(c => c.studentId === stuId);
          const latestGMS = gms[gms.length-1].score;
          const firstGMS = gms[0].score;
          const gmsDelta = latestGMS - firstGMS;
          const fbSuccess = stuFallbacks.filter(m => m.originPassedAfter === true).length;

          // 종합 의견 자동 생성
          let comment = '';
          if (progPct >= 90 && quiz.rate >= 85) {
            comment = `${stu.name} 학생은 ${progPct}%의 높은 진도율과 ${quiz.rate}%의 정답률을 보이며 매우 우수하게 학습을 진행하고 있습니다. 단원의 핵심 개념을 정확히 이해하고 있어 다음 학년 학습으로의 자연스러운 연계가 기대됩니다.`;
          } else if (progPct >= 70 || quiz.rate >= 70) {
            comment = `${stu.name} 학생은 안정적으로 학습을 따라가고 있습니다. N-Protocol 디딤 학습을 ${stuFallbacks.length}회 활용하여 ${fbSuccess}회 효과를 보았으며, 꾸준한 성장 추세(GMS ${firstGMS}→${latestGMS}, ${gmsDelta>=0?'+':''}${gmsDelta})를 보이고 있습니다.`;
          } else if (progPct >= 40) {
            comment = `${stu.name} 학생은 기본 학습은 따라오고 있으나 추가 지원이 필요합니다. 최근 약점인 '${quiz.lastWeak}' 영역에 대한 개별 지도와 디딤 학습의 적극 활용을 권장합니다.`;
          } else {
            comment = `${stu.name} 학생은 학습에 어려움을 겪고 있어 적극적인 개별 지도가 필요합니다. 디딤 학습 ${stuFallbacks.length}회 사용 중 ${fbSuccess}회만 효과를 보였으며, 선수 학습 결손을 진단하여 사전 지도가 우선되어야 합니다.`;
          }

          const statusColor = (s) => s === 'pass' ? '#10b981' : s === 'learning' ? '#f59e0b' : '#cbd5e1';
          const statusLabel = (s) => s === 'pass' ? '통과' : s === 'learning' ? '도전중' : '시작전';

          return (
            <div key={stuId} className="print-student-report" style={{ fontSize:'10pt', color:'#1e293b' }}>
              {/* 헤더 */}
              <div style={{ borderBottom:'2px solid #1e293b', paddingBottom:'8mm', marginBottom:'6mm' }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end' }}>
                  <div>
                    <p style={{ fontSize:'9pt', color:'#64748b', margin:0, letterSpacing:'1pt', fontWeight:'bold' }}>N-PROTOCOL · 성장 이음 리포트</p>
                    <h1 style={{ fontSize:'22pt', fontWeight:900, color:'#0f172a', margin:'2mm 0 1mm' }}>{stu.name} <span style={{ fontSize:'12pt', color:'#64748b', fontWeight:500 }}>학생</span></h1>
                    <p style={{ fontSize:'9pt', color:'#64748b', margin:0 }}>능동초등학교 3학년 · 5단원 분수 · {stu.id} · {stu.traits}</p>
                  </div>
                  <div style={{ textAlign:'right' }}>
                    <p style={{ fontSize:'8pt', color:'#94a3b8', margin:0 }}>출력일</p>
                    <p style={{ fontSize:'11pt', color:'#1e293b', margin:0, fontWeight:'bold' }}>{today}</p>
                  </div>
                </div>
              </div>

              {/* 핵심 지표 */}
              <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:'3mm', marginBottom:'6mm' }}>
                <div style={{ border:'1.5px solid #10b981', borderRadius:'2mm', padding:'3mm', textAlign:'center', background:'#ecfdf5' }}>
                  <p style={{ fontSize:'8pt', color:'#047857', margin:0, fontWeight:'bold' }}>진도율</p>
                  <p style={{ fontSize:'18pt', color:'#047857', margin:'1mm 0', fontWeight:900 }}>{progPct}%</p>
                  <p style={{ fontSize:'7pt', color:'#10b981', margin:0 }}>{passed}/{totalLessons}차시 통과</p>
                </div>
                <div style={{ border:'1.5px solid #6366f1', borderRadius:'2mm', padding:'3mm', textAlign:'center', background:'#eef2ff' }}>
                  <p style={{ fontSize:'8pt', color:'#4338ca', margin:0, fontWeight:'bold' }}>현재 GMS</p>
                  <p style={{ fontSize:'18pt', color:'#4338ca', margin:'1mm 0', fontWeight:900 }}>{latestGMS}</p>
                  <p style={{ fontSize:'7pt', color:'#6366f1', margin:0 }}>{gmsDelta>=0?'+':''}{gmsDelta} (U1→U6)</p>
                </div>
                <div style={{ border:'1.5px solid #f59e0b', borderRadius:'2mm', padding:'3mm', textAlign:'center', background:'#fffbeb' }}>
                  <p style={{ fontSize:'8pt', color:'#b45309', margin:0, fontWeight:'bold' }}>퀴즈 정답률</p>
                  <p style={{ fontSize:'18pt', color:'#b45309', margin:'1mm 0', fontWeight:900 }}>{quiz.rate}%</p>
                  <p style={{ fontSize:'7pt', color:'#f59e0b', margin:0 }}>{quiz.correct}/{quiz.attempts}문항</p>
                </div>
                <div style={{ border:'1.5px solid #f43f5e', borderRadius:'2mm', padding:'3mm', textAlign:'center', background:'#fff1f2' }}>
                  <p style={{ fontSize:'8pt', color:'#be123c', margin:0, fontWeight:'bold' }}>디딤 사용</p>
                  <p style={{ fontSize:'18pt', color:'#be123c', margin:'1mm 0', fontWeight:900 }}>{stuFallbacks.length}</p>
                  <p style={{ fontSize:'7pt', color:'#f43f5e', margin:0 }}>{fbSuccess}회 효과</p>
                </div>
              </div>

              {/* 단원별 GMS 차트 */}
              <h2 style={{ fontSize:'11pt', fontWeight:'bold', color:'#1e293b', margin:'0 0 3mm', borderLeft:'3px solid #6366f1', paddingLeft:'3mm' }}>📈 단원별 GMS 추이</h2>
              <div style={{ background:'#f8fafc', borderRadius:'2mm', padding:'3mm', marginBottom:'6mm' }}>
                <svg viewBox="0 0 260 110" style={{ width:'100%', height:'auto' }}>
                  {[100, 85, 70, 55, 0].map(v => {
                    const y = 90 - (v/100) * 75;
                    return <g key={v}>
                      <line x1="22" y1={y} x2="255" y2={y} stroke="#cbd5e1" strokeWidth="0.4" />
                      <text x="18" y={y+2} textAnchor="end" fontSize="5" fill="#94a3b8">{v}</text>
                    </g>;
                  })}
                  {gms.map((p, i) => {
                    if (i === 0) return null;
                    const prev = gms[i-1];
                    const x1 = 28 + ((i-1)/(gms.length-1)) * 220;
                    const x2 = 28 + (i/(gms.length-1)) * 220;
                    const y1 = 90 - (prev.score/100) * 75;
                    const y2 = 90 - (p.score/100) * 75;
                    return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#6366f1" strokeWidth="1.5" strokeLinecap="round" strokeDasharray={(p.isVirtual||prev.isVirtual)?'3 2':''} />;
                  })}
                  {gms.map((p, i) => {
                    const x = 28 + (i/(gms.length-1)) * 220;
                    const y = 90 - (p.score/100) * 75;
                    const unit = unitMeta.find(u => u.id === p.unitId);
                    return <g key={i}>
                      {!p.isVirtual && <circle cx={x} cy={y} r="6" fill={unit.color} opacity="0.25" />}
                      <circle cx={x} cy={y} r={p.isVirtual?"3":"4"} fill={unit.color} stroke="white" strokeWidth="1" />
                      <text x={x} y={y-5} textAnchor="middle" fontSize="6" fill="#1e293b" fontWeight="bold">{p.score}</text>
                      <text x={x} y="103" textAnchor="middle" fontSize="5" fill={unit.dark} fontWeight="bold">{p.unitId}</text>
                      <text x={x} y="108" textAnchor="middle" fontSize="4.5" fill="#94a3b8">{unit.name}</text>
                    </g>;
                  })}
                </svg>
                <p style={{ fontSize:'7pt', color:'#64748b', margin:'2mm 0 0' }}>━━ 실제 데이터 (5단원 분수)   ╌╌ 시연용 가상 데이터   ※ 단원 색 = 영역별</p>
              </div>

              {/* GMS 산출 분해 */}
              <h2 style={{ fontSize:'11pt', fontWeight:'bold', color:'#1e293b', margin:'0 0 3mm', borderLeft:'3px solid #6366f1', paddingLeft:'3mm' }}>🔬 GMS 산출 공식 — {realUnit.unitId} {unitMeta.find(u=>u.id===realUnit.unitId).name} (총 {realUnit.score}점)</h2>
              <div style={{ display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:'3mm', marginBottom:'6mm' }}>
                <div style={{ border:'1px solid #e2e8f0', borderRadius:'2mm', padding:'3mm', textAlign:'center' }}>
                  <p style={{ fontSize:'7pt', color:'#64748b', margin:0 }}>진도율 × 50%</p>
                  <p style={{ fontSize:'14pt', fontWeight:900, color:'#1e293b', margin:'1mm 0' }}>{realUnit.P}</p>
                  <p style={{ fontSize:'7pt', color:'#10b981', fontWeight:'bold', margin:0 }}>= {(realUnit.P*0.5).toFixed(1)}점</p>
                </div>
                <div style={{ border:'1px solid #e2e8f0', borderRadius:'2mm', padding:'3mm', textAlign:'center' }}>
                  <p style={{ fontSize:'7pt', color:'#64748b', margin:0 }}>퀴즈 정답률 × 30%</p>
                  <p style={{ fontSize:'14pt', fontWeight:900, color:'#1e293b', margin:'1mm 0' }}>{realUnit.Q}</p>
                  <p style={{ fontSize:'7pt', color:'#f59e0b', fontWeight:'bold', margin:0 }}>= {(realUnit.Q*0.3).toFixed(1)}점</p>
                </div>
                <div style={{ border:'1px solid #e2e8f0', borderRadius:'2mm', padding:'3mm', textAlign:'center' }}>
                  <p style={{ fontSize:'7pt', color:'#64748b', margin:0 }}>디딤 활용 효과 × 20%</p>
                  <p style={{ fontSize:'14pt', fontWeight:900, color:'#1e293b', margin:'1mm 0' }}>{realUnit.F}</p>
                  <p style={{ fontSize:'7pt', color:'#f43f5e', fontWeight:'bold', margin:0 }}>= {(realUnit.F*0.2).toFixed(1)}점</p>
                </div>
              </div>

              {/* 차시별 진도 */}
              <h2 style={{ fontSize:'11pt', fontWeight:'bold', color:'#1e293b', margin:'0 0 3mm', borderLeft:'3px solid #6366f1', paddingLeft:'3mm' }}>📚 차시별 진도 (5단원 분수)</h2>
              <div style={{ display:'grid', gridTemplateColumns:'repeat(2, 1fr)', gap:'2mm', marginBottom:'6mm' }}>
                {lessonOrder.map(lid => {
                  const lesson = lessonByIdMap[lid];
                  const status = prog[lid];
                  return (
                    <div key={lid} style={{ display:'flex', alignItems:'center', gap:'2mm', fontSize:'8.5pt', border:'1px solid #e2e8f0', borderRadius:'1.5mm', padding:'1.5mm 2.5mm' }}>
                      <div style={{ width:'2.5mm', height:'2.5mm', borderRadius:'50%', backgroundColor:statusColor(status), flexShrink:0 }}></div>
                      <span style={{ flex:1, color:'#334155' }}>{lesson?.number} {lesson?.title}</span>
                      <span style={{ fontSize:'7.5pt', color:'#64748b', fontWeight:'bold' }}>{statusLabel(status)}</span>
                    </div>
                  );
                })}
              </div>

              {/* 디딤 이동 기록 */}
              <h2 style={{ fontSize:'11pt', fontWeight:'bold', color:'#1e293b', margin:'0 0 3mm', borderLeft:'3px solid #6366f1', paddingLeft:'3mm' }}>🪜 N-Protocol 디딤 이동 기록 ({stuFallbacks.length}건)</h2>
              {stuFallbacks.length === 0 ? (
                <p style={{ fontSize:'8.5pt', color:'#94a3b8', fontStyle:'italic', margin:'0 0 6mm' }}>디딤 이동 기록 없음 — 학생이 모든 차시를 첫 시도에 통과했거나 아직 도전 중인 차시가 없습니다.</p>
              ) : (
                <table style={{ width:'100%', borderCollapse:'collapse', fontSize:'8pt', marginBottom:'6mm' }}>
                  <thead>
                    <tr style={{ background:'#f1f5f9' }}>
                      <th style={{ padding:'2mm', textAlign:'left', border:'1px solid #cbd5e1', fontWeight:'bold' }}>일시</th>
                      <th style={{ padding:'2mm', textAlign:'left', border:'1px solid #cbd5e1', fontWeight:'bold' }}>출발</th>
                      <th style={{ padding:'2mm', textAlign:'left', border:'1px solid #cbd5e1', fontWeight:'bold' }}>도착</th>
                      <th style={{ padding:'2mm', textAlign:'center', border:'1px solid #cbd5e1', fontWeight:'bold' }}>단계</th>
                      <th style={{ padding:'2mm', textAlign:'center', border:'1px solid #cbd5e1', fontWeight:'bold' }}>효과</th>
                    </tr>
                  </thead>
                  <tbody>
                    {stuFallbacks.map(m => {
                      const fromName = lessonByIdMap[m.fromLesson]?.number || m.fromLesson;
                      const toName = lessonByIdMap[m.toLesson]?.number || m.toLesson;
                      return (
                        <tr key={m.id}>
                          <td style={{ padding:'1.5mm 2mm', border:'1px solid #cbd5e1' }}>{m.date.slice(5)} {m.time}</td>
                          <td style={{ padding:'1.5mm 2mm', border:'1px solid #cbd5e1' }}>{fromName}</td>
                          <td style={{ padding:'1.5mm 2mm', border:'1px solid #cbd5e1' }}>{toName} <span style={{ color:'#64748b', fontSize:'7pt' }}>({m.type})</span></td>
                          <td style={{ padding:'1.5mm 2mm', textAlign:'center', border:'1px solid #cbd5e1', fontWeight:'bold' }}>{m.tier}단계</td>
                          <td style={{ padding:'1.5mm 2mm', textAlign:'center', border:'1px solid #cbd5e1', fontWeight:'bold', color: m.originPassedAfter===true?'#10b981':m.originPassedAfter===false?'#ef4444':'#94a3b8' }}>
                            {m.originPassedAfter===true?'✓ 통과':m.originPassedAfter===false?'× 미통과':'미정'}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              )}

              {/* 약점 + 종합 의견 */}
              <h2 style={{ fontSize:'11pt', fontWeight:'bold', color:'#1e293b', margin:'0 0 3mm', borderLeft:'3px solid #6366f1', paddingLeft:'3mm' }}>📋 담임 종합 의견</h2>
              <div style={{ border:'1.5px solid #6366f1', borderRadius:'2mm', padding:'4mm', background:'#f8fafc', marginBottom:'4mm' }}>
                <p style={{ fontSize:'8.5pt', color:'#1e293b', margin:'0 0 2mm', lineHeight:'1.6' }}>{comment}</p>
                <p style={{ fontSize:'8pt', color:'#64748b', margin:0, lineHeight:'1.5' }}>
                  <span style={{ fontWeight:'bold' }}>최근 약점:</span> {quiz.lastWeak} &nbsp;|&nbsp;
                  <span style={{ fontWeight:'bold' }}>호출 횟수:</span> {stuCalls.length}회
                </p>
              </div>

              {/* 푸터 */}
              <div style={{ marginTop:'auto', paddingTop:'4mm', borderTop:'1px solid #e2e8f0', display:'flex', justifyContent:'space-between', fontSize:'7pt', color:'#94a3b8' }}>
                <span>능동초등학교 N-Protocol 연구학교 · 성장 이음 리포트</span>
                <span>본 리포트는 시연용 가상 데이터로 작성되었습니다 (U5 분수 제외)</span>
              </div>
            </div>
          );
        };

        return (
          <div className="print-area">
            {printTargets.map(id => renderOne(id))}
          </div>
        );
      };

      const renderTeacherDashboard = () => {
        const pendingCalls = calls.filter(c => c.status === 'pending');

        // ===== 헬퍼: 차시 ID → 차시 정보 =====
        const lessonByIdMap = Object.fromEntries(lessons.map(l => [l.id, l]));

        // ===== 학급 통계 계산 =====
        const totalStudents = studentRoster.length;
        const totalLessons = lessonOrder.length;
        const totalCells = totalStudents * totalLessons;
        let totalPass = 0, totalLearning = 0, totalPending = 0;
        for (const sid of Object.keys(studentProgressData)) {
          for (const lid of lessonOrder) {
            const s = studentProgressData[sid][lid];
            if (s === 'pass') totalPass++;
            else if (s === 'learning') totalLearning++;
            else totalPending++;
          }
        }
        const classProgressPct = Math.round((totalPass / totalCells) * 100);
        const avgGMS = Math.round(Object.values(gmsHistory).reduce((s, h) => s + h[h.length-1].score, 0) / totalStudents);
        const totalFallbacks = fallbackMoves.length;
        const fallbackSuccess = fallbackMoves.filter(m => m.originPassedAfter === true).length;
        const fallbackSuccessRate = totalFallbacks ? Math.round((fallbackSuccess / totalFallbacks) * 100) : 0;

        // ===== 차시별 막힘 통계 (어느 차시에서 가장 많이 디딤 사용) =====
        const stuckByLesson = {};
        for (const m of fallbackMoves) {
          stuckByLesson[m.fromLesson] = (stuckByLesson[m.fromLesson] || 0) + 1;
        }
        const stuckSorted = Object.entries(stuckByLesson).sort((a, b) => b[1] - a[1]);

        // ===== 다운로드 함수들 =====
        const download = (filename, content, mime) => {
          const blob = new Blob([content], { type: mime });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = filename;
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
          URL.revokeObjectURL(url);
        };

        const downloadCSV = () => {
          const rows = [['학생ID','이름','특성','진도율%','최신GMS','퀴즈정답률%','디딤사용횟수','막힘영역']];
          for (const stu of studentRoster) {
            const prog = studentProgressData[stu.id];
            const passed = Object.values(prog).filter(v=>v==='pass').length;
            const progPct = Math.round((passed/totalLessons)*100);
            const gms = gmsHistory[stu.id];
            const latestGMS = gms[gms.length-1].score;
            const quiz = quizSummary[stu.id];
            const fbCount = fallbackMoves.filter(m=>m.studentId===stu.id).length;
            rows.push([stu.id, stu.name, stu.traits, progPct, latestGMS, quiz.rate, fbCount, quiz.lastWeak]);
          }
          rows.push([]);
          rows.push(['단원별 GMS 산출 (P=진도율·50% / Q=퀴즈정답률·30% / F=디딤효과·20%)']);
          rows.push(['학생ID','이름','단원ID','단원명','진도율P','퀴즈정답률Q','디딤효과F','GMS총점','데이터유형']);
          for (const stu of studentRoster) {
            for (const g of gmsHistory[stu.id]) {
              const u = unitMeta.find(m => m.id === g.unitId);
              rows.push([stu.id, stu.name, g.unitId, u?.name||'', g.P, g.Q, g.F, g.score, g.isVirtual?'시연용가상':'실제']);
            }
          }
          rows.push([]);
          rows.push(['디딤 이동 기록 (N-Protocol 핵심 데이터)']);
          rows.push(['날짜','시간','학생ID','이름','출발차시','도착차시','디딤단계','유형','원차시통과여부']);
          for (const m of fallbackMoves) {
            const stu = studentRoster.find(s=>s.id===m.studentId);
            const fromName = lessonByIdMap[m.fromLesson]?.title || m.fromLesson;
            const toName = lessonByIdMap[m.toLesson]?.title || m.toLesson;
            rows.push([m.date, m.time, m.studentId, stu?.name||'', fromName, toName, m.tier+'단계', m.type, m.originPassedAfter===true?'통과':m.originPassedAfter===false?'미통과':'미정']);
          }
          const csv = '\ufeff' + rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
          download(`성장이음리포트_${new Date().toISOString().slice(0,10)}.csv`, csv, 'text/csv;charset=utf-8;');
        };

        const downloadJSON = () => {
          const data = {
            meta: { school:'능동초등학교', grade:3, semester:2, unit:'5단원 분수', exportedAt: new Date().toISOString() },
            students: studentRoster.map(stu => {
              const prog = studentProgressData[stu.id];
              const passed = Object.values(prog).filter(v=>v==='pass').length;
              return {
                id: stu.id, name: stu.name, traits: stu.traits,
                progress: { passed, total: totalLessons, percent: Math.round((passed/totalLessons)*100), byLesson: prog },
                gms: gmsHistory[stu.id],
                quiz: quizSummary[stu.id],
                fallbackMoves: fallbackMoves.filter(m=>m.studentId===stu.id),
                calls: calls.filter(c=>c.studentId===stu.id).map(c=>({ time:c.time, type:c.type.label, location:c.location, status:c.status })),
              };
            }),
            fallbackEffectiveness,
            classSummary: { totalStudents, classProgressPct, avgGMS, totalFallbacks, fallbackSuccessRate },
          };
          download(`성장이음리포트_${new Date().toISOString().slice(0,10)}.json`, JSON.stringify(data, null, 2), 'application/json;charset=utf-8;');
        };

        const downloadPDF = () => {
          // window.print()로 인쇄 화면 띄움 - 사용자가 'PDF로 저장' 선택
          window.print();
        };

        // ===== 학생 리포트 인쇄 핸들러 =====
        // printTargets에 학생 ID 배열을 담아두면 인쇄 영역에 그들의 리포트가 렌더링됨
        const printStudentReports = (studentIds) => {
          setPrintTargets(studentIds);
          // 다음 렌더 후 인쇄 호출 (DOM 업데이트 대기)
          setTimeout(() => {
            window.print();
            // 인쇄 다이얼로그 닫힌 후 상태 초기화
            setTimeout(() => setPrintTargets([]), 500);
          }, 100);
        };

        // ===== 진도 색상 =====
        const statusColor = (s) => s === 'pass' ? '#10b981' : s === 'learning' ? '#f59e0b' : '#e2e8f0';
        const statusLabel = (s) => s === 'pass' ? '통과' : s === 'learning' ? '도전중' : '시작전';

        // ===== 학생 상세 카드 (성장 이음 리포트) =====
        const renderStudentDetail = (stuId) => {
          const stu = studentRoster.find(s => s.id === stuId);
          const prog = studentProgressData[stuId];
          const passed = Object.values(prog).filter(v=>v==='pass').length;
          const gms = gmsHistory[stuId];
          const quiz = quizSummary[stuId];
          const stuFallbacks = fallbackMoves.filter(m => m.studentId === stuId);
          const stuCalls = calls.filter(c => c.studentId === stuId);
          // GMS 미니 그래프용
          const maxGMS = Math.max(...gms.map(g=>g.score));
          const minGMS = Math.min(...gms.map(g=>g.score));
          const gmsRange = Math.max(10, maxGMS - minGMS);
          const gmsDelta = gms[gms.length-1].score - gms[0].score;

          return (
            <div className="bg-white border border-slate-200 rounded-2xl p-6 space-y-5">
              {/* 헤더 */}
              <div className="flex items-start justify-between flex-wrap gap-3">
                <div className="flex items-center gap-3">
                  <div className="w-14 h-14 rounded-full bg-gradient-to-br from-indigo-100 to-purple-100 flex items-center justify-center text-3xl">{stu.avatar}</div>
                  <div>
                    <div className="flex items-center gap-2">
                      <h3 className="text-xl font-bold text-slate-900">{stu.name}</h3>
                      <span className="text-xs text-slate-500 font-mono bg-slate-100 px-2 py-0.5 rounded">{stu.id}</span>
                    </div>
                    <p className="text-xs text-slate-500 mt-0.5">{stu.traits} · 3학년 2학기 · 5단원 분수</p>
                  </div>
                </div>
                <div className="flex items-center gap-2">
                  <button
                    onClick={() => printStudentReports([stuId])}
                    className="bg-indigo-500 hover:bg-indigo-600 text-white text-xs font-bold px-3 py-1.5 rounded-lg flex items-center gap-1.5 transition-colors"
                  >📄 이 학생 리포트 인쇄</button>
                  <button onClick={() => setSelectedStudent(null)} className="text-xs text-slate-500 hover:text-slate-900 font-medium">← 학생 목록으로</button>
                </div>
              </div>

              {/* 핵심 지표 4박스 */}
              <div className="grid grid-cols-4 gap-3">
                <div className="bg-emerald-50 border border-emerald-100 rounded-xl p-3 text-center">
                  <p className="text-[10px] font-semibold text-emerald-700 mb-1">진도율</p>
                  <p className="text-2xl font-black text-emerald-700">{Math.round((passed/totalLessons)*100)}%</p>
                  <p className="text-[10px] text-emerald-600 mt-0.5">{passed}/{totalLessons}차시</p>
                </div>
                <div className="bg-indigo-50 border border-indigo-100 rounded-xl p-3 text-center">
                  <p className="text-[10px] font-semibold text-indigo-700 mb-1">현재 GMS</p>
                  <p className="text-2xl font-black text-indigo-700">{gms[gms.length-1].score}</p>
                  <p className="text-[10px] text-indigo-600 mt-0.5">{gmsDelta>=0?'+':''}{gmsDelta} (U1→U6)</p>
                </div>
                <div className="bg-amber-50 border border-amber-100 rounded-xl p-3 text-center">
                  <p className="text-[10px] font-semibold text-amber-700 mb-1">퀴즈 정답률</p>
                  <p className="text-2xl font-black text-amber-700">{quiz.rate}%</p>
                  <p className="text-[10px] text-amber-600 mt-0.5">{quiz.correct}/{quiz.attempts}문항</p>
                </div>
                <div className="bg-rose-50 border border-rose-100 rounded-xl p-3 text-center">
                  <p className="text-[10px] font-semibold text-rose-700 mb-1">디딤 사용</p>
                  <p className="text-2xl font-black text-rose-700">{stuFallbacks.length}</p>
                  <p className="text-[10px] text-rose-600 mt-0.5">{stuFallbacks.filter(m=>m.originPassedAfter===true).length}회 효과</p>
                </div>
              </div>

              {/* 차시별 진도 + GMS 추이 */}
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <h4 className="text-sm font-bold text-slate-800 mb-2">📚 차시별 진도</h4>
                  <div className="space-y-1.5">
                    {lessonOrder.map(lid => {
                      const lesson = lessonByIdMap[lid];
                      const status = prog[lid];
                      return (
                        <div key={lid} className="flex items-center gap-2 text-xs">
                          <div className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{ backgroundColor: statusColor(status) }}></div>
                          <span className="text-slate-700 flex-1 truncate">{lesson?.number} {lesson?.title}</span>
                          <span className="text-[10px] text-slate-500 font-medium">{statusLabel(status)}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
                <div>
                  <h4 className="text-sm font-bold text-slate-800 mb-2">📈 단원별 GMS (성장 모멘텀 지수)</h4>
                  <svg viewBox="0 0 260 130" className="w-full bg-slate-50 rounded-lg">
                    {/* 가로선 + 기준점 라벨 (좌측) */}
                    {[100, 85, 70, 55, 0].map(v => {
                      const y = 105 - (v/100) * 90;
                      return (
                        <g key={v}>
                          <line x1="22" y1={y} x2="255" y2={y} stroke="#e2e8f0" strokeWidth="0.4" strokeDasharray={v===0||v===100?'':'2 2'} />
                          <text x="18" y={y+2} textAnchor="end" fontSize="5.5" fill="#94a3b8">{v}</text>
                        </g>
                      );
                    })}
                    {/* 데이터 라인 (점들을 부드럽게 연결) */}
                    {gms.map((p, i) => {
                      if (i === 0) return null;
                      const prev = gms[i-1];
                      const x1 = 28 + ((i-1)/(gms.length-1)) * 220;
                      const x2 = 28 + (i/(gms.length-1)) * 220;
                      const y1 = 105 - (prev.score/100) * 90;
                      const y2 = 105 - (p.score/100) * 90;
                      // 양 끝 점 중 하나라도 가상이면 점선
                      const isLineVirtual = p.isVirtual || prev.isVirtual;
                      return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#6366f1" strokeWidth="2" strokeLinecap="round" strokeDasharray={isLineVirtual ? '4 3' : ''} />;
                    })}
                    {/* 점 + 라벨 (단원별 색상) */}
                    {gms.map((p, i) => {
                      const x = 28 + (i/(gms.length-1)) * 220;
                      const y = 105 - (p.score/100) * 90;
                      const unit = unitMeta.find(u => u.id === p.unitId);
                      return (
                        <g key={i}>
                          {!p.isVirtual && <circle cx={x} cy={y} r="7" fill={unit.color} opacity="0.25" />}
                          <circle cx={x} cy={y} r={p.isVirtual ? "3.5" : "4.5"} fill={unit.color} stroke="white" strokeWidth="1.5" />
                          <text x={x} y={y-7} textAnchor="middle" fontSize="6.5" fill="#1e293b" fontWeight="bold">{p.score}</text>
                          <text x={x} y="120" textAnchor="middle" fontSize="5.5" fill={unit.dark} fontWeight="bold">{p.unitId}</text>
                          <text x={x} y="128" textAnchor="middle" fontSize="5" fill="#94a3b8">{unit.name}</text>
                        </g>
                      );
                    })}
                  </svg>
                  <div className="flex items-center justify-between mt-1 px-1">
                    <p className="text-[9px] text-slate-500">━━ 실제 (5단원 분수)   ╌╌ 시연용 가상</p>
                    <p className="text-[9px] text-slate-500 italic">단원 색 = 영역별</p>
                  </div>
                </div>
              </div>

              {/* GMS 분해 — 현재 단원의 GMS 구성 요소 */}
              {(() => {
                const realUnit = gms.find(g => !g.isVirtual) || gms[gms.length-1];
                const unit = unitMeta.find(u => u.id === realUnit.unitId);
                return (
                  <div className="bg-gradient-to-br from-indigo-50 to-purple-50 border border-indigo-100 rounded-xl p-4">
                    <div className="flex items-center justify-between mb-2 flex-wrap gap-2">
                      <h4 className="text-sm font-bold text-indigo-900">🔬 GMS 산출 공식 — <span style={{color:unit.dark}}>{realUnit.unitId} {unit.name}</span></h4>
                      <span className="text-[10px] bg-white text-indigo-700 px-2 py-0.5 rounded-full font-bold">총 {realUnit.score}점</span>
                    </div>
                    <div className="grid grid-cols-3 gap-2 mb-2">
                      <div className="bg-white rounded-lg p-2.5 text-center">
                        <p className="text-[10px] text-slate-500 mb-1">진도율 × 50%</p>
                        <p className="text-lg font-black text-slate-900">{realUnit.P}</p>
                        <p className="text-[10px] text-emerald-600 font-semibold mt-0.5">= {(realUnit.P*0.5).toFixed(1)}점</p>
                      </div>
                      <div className="bg-white rounded-lg p-2.5 text-center">
                        <p className="text-[10px] text-slate-500 mb-1">퀴즈 정답률 × 30%</p>
                        <p className="text-lg font-black text-slate-900">{realUnit.Q}</p>
                        <p className="text-[10px] text-amber-600 font-semibold mt-0.5">= {(realUnit.Q*0.3).toFixed(1)}점</p>
                      </div>
                      <div className="bg-white rounded-lg p-2.5 text-center">
                        <p className="text-[10px] text-slate-500 mb-1">디딤 활용 효과 × 20%</p>
                        <p className="text-lg font-black text-slate-900">{realUnit.F}</p>
                        <p className="text-[10px] text-rose-600 font-semibold mt-0.5">= {(realUnit.F*0.2).toFixed(1)}점</p>
                      </div>
                    </div>
                    <p className="text-[10px] text-indigo-700 leading-relaxed bg-white/60 rounded-lg px-2.5 py-2">
                      💡 <strong>GMS = 진도율(50%) + 퀴즈 정답률(30%) + 디딤 활용 효과(20%)</strong>
                      <br />자기점검 퀴즈만으로 측정 가능한 단순 공식. <strong>디딤 활용 효과</strong>가 20%로 반영되어 N-Protocol의 작동 여부가 학생 성장에 직접 기여합니다.
                    </p>
                  </div>
                );
              })()}

              {/* 디딤 이동 기록 */}
              <div>
                <h4 className="text-sm font-bold text-slate-800 mb-2">🪜 디딤 이동 기록 ({stuFallbacks.length}건)</h4>
                {stuFallbacks.length === 0 ? (
                  <p className="text-xs text-slate-400 italic py-2">아직 디딤을 사용한 기록이 없습니다.</p>
                ) : (
                  <div className="space-y-1.5">
                    {stuFallbacks.map(m => {
                      const fromName = lessonByIdMap[m.fromLesson]?.number || m.fromLesson;
                      const toName = lessonByIdMap[m.toLesson]?.number || m.toLesson;
                      const tierColor = m.tier===1?'emerald':m.tier===2?'amber':m.tier===3?'orange':'rose';
                      return (
                        <div key={m.id} className="flex items-center gap-2 text-xs bg-slate-50 rounded-lg px-3 py-2">
                          <span className={`bg-${tierColor}-500 text-white font-bold px-1.5 py-0.5 rounded text-[10px] flex-shrink-0`}>{m.tier}단계</span>
                          <span className="text-slate-600">{m.date} {m.time}</span>
                          <span className="text-slate-700 font-medium">{fromName} → {toName}</span>
                          <span className="text-[10px] text-slate-500">({m.type})</span>
                          <span className="ml-auto text-[10px] font-semibold" style={{ color: m.originPassedAfter===true?'#10b981':m.originPassedAfter===false?'#ef4444':'#94a3b8' }}>
                            {m.originPassedAfter===true?'✓ 원차시 통과':m.originPassedAfter===false?'× 미통과':'미정'}
                          </span>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>

              {/* 호출 이력 + 약점 */}
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <h4 className="text-sm font-bold text-slate-800 mb-2">📞 호출 이력 ({stuCalls.length}건)</h4>
                  {stuCalls.length === 0 ? (
                    <p className="text-xs text-slate-400 italic">호출 없음</p>
                  ) : (
                    <div className="space-y-1.5">
                      {stuCalls.map(c => (
                        <div key={c.id} className="text-xs bg-slate-50 rounded-lg px-3 py-2">
                          <div className="flex items-center gap-1.5 mb-0.5">
                            <span>{c.type.icon}</span>
                            <span className="font-medium text-slate-700">{c.type.label}</span>
                          </div>
                          <p className="text-[10px] text-slate-500">{c.location} · {c.time}</p>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
                <div>
                  <h4 className="text-sm font-bold text-slate-800 mb-2">🎯 주요 약점 영역</h4>
                  <div className="bg-amber-50 border border-amber-100 rounded-lg p-3">
                    <p className="text-xs text-amber-800"><span className="font-semibold">최근 약점:</span> {quiz.lastWeak}</p>
                    <p className="text-[10px] text-amber-700 mt-1.5 leading-relaxed">💡 권장 처방: 이 학생은 디딤 {stuFallbacks.length}회 사용 중 {stuFallbacks.filter(m=>m.originPassedAfter===true).length}회 효과를 보였습니다. {gmsDelta >= 10 ? '꾸준한 성장 추세' : '추가 개별 지도가 필요할 수 있음'}.</p>
                  </div>
                </div>
              </div>
            </div>
          );
        };

        return (
          <div className="space-y-5">
            {/* 헤더 */}
            <div className="flex items-center justify-between flex-wrap gap-3">
              <div>
                <div className="flex items-center gap-2 flex-wrap">
                  <h2 className="text-2xl font-black text-slate-900">교사용 대시보드</h2>
                  <span className="text-[10px] bg-amber-100 text-amber-800 px-2 py-0.5 rounded-full font-bold border border-amber-200" title="실제 백엔드 연동 전까지는 시연용 가상 데이터입니다.">⚠️ 시연용 가상 데이터</span>
                </div>
                <p className="text-xs text-slate-500 mt-0.5">능동초등학교 3학년 · 5단원 분수 · 5월 13일 (수)</p>
              </div>
              {pendingCalls.length > 0 && (
                <div className="bg-red-500 text-white text-xs font-bold px-3 py-1.5 rounded-full flex items-center gap-1.5 pulse-ring">
                  <span>🔔</span>
                  <span>{pendingCalls.length}명 호출 대기</span>
                </div>
              )}
            </div>

            {/* 핵심 지표 4박스 */}
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
              <div className="bg-white border border-slate-200 rounded-xl p-4">
                <p className="text-xs text-slate-500 mb-1">학급 진도율</p>
                <p className="text-3xl font-black text-emerald-600">{classProgressPct}%</p>
                <div className="mt-2 w-full bg-slate-100 rounded-full h-1.5 overflow-hidden">
                  <div className="bg-emerald-500 h-full rounded-full" style={{ width: `${classProgressPct}%` }}></div>
                </div>
                <p className="text-[10px] text-slate-500 mt-1">{totalPass}/{totalCells} 통과</p>
              </div>
              <div className="bg-white border border-slate-200 rounded-xl p-4">
                <p className="text-xs text-slate-500 mb-1">평균 GMS</p>
                <p className="text-3xl font-black text-indigo-600">{avgGMS}</p>
                <p className="text-[10px] text-slate-500 mt-2">5명 평균 (이번 주)</p>
              </div>
              <div className="bg-white border border-slate-200 rounded-xl p-4">
                <p className="text-xs text-slate-500 mb-1">디딤 사용</p>
                <p className="text-3xl font-black text-amber-600">{totalFallbacks}</p>
                <p className="text-[10px] text-slate-500 mt-2">N-Protocol 작동 {totalFallbacks}회</p>
              </div>
              <div className="bg-white border border-slate-200 rounded-xl p-4">
                <p className="text-xs text-slate-500 mb-1">디딤 효과율</p>
                <p className="text-3xl font-black text-rose-600">{fallbackSuccessRate}%</p>
                <p className="text-[10px] text-slate-500 mt-2">원차시 재통과율</p>
              </div>
            </div>

            {/* 호출 알림 (대기 중) */}
            {pendingCalls.length > 0 && (
              <div className="bg-red-50 border-2 border-red-200 rounded-2xl p-4">
                <h3 className="text-sm font-bold text-red-900 mb-2 flex items-center gap-1.5">🔔 호출 대기 중 ({pendingCalls.length})</h3>
                <div className="space-y-1.5">
                  {pendingCalls.map(c => (
                    <div key={c.id} className="bg-white rounded-lg px-3 py-2 flex items-center gap-2.5">
                      <span className="text-lg">{c.type.icon}</span>
                      <div className="flex-1">
                        <p className="text-sm font-semibold text-slate-800">{c.student} <span className="text-xs text-slate-500 font-normal">({c.studentId})</span></p>
                        <p className="text-[10px] text-slate-500">{c.type.label} · {c.location}</p>
                      </div>
                      <span className="text-xs text-red-600 font-medium">{c.time}</span>
                      <button onClick={() => setCalls(prev => prev.map(x => x.id===c.id ? {...x, status:'resolved'} : x))} className="bg-red-500 hover:bg-red-600 text-white text-xs font-bold px-3 py-1.5 rounded-lg">해결</button>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* 탭 메뉴 */}
            <div className="bg-white border border-slate-200 rounded-xl p-1 flex gap-1 flex-wrap">
              {[
                { id:'overview', label:'반 전체 진도', icon:'📊' },
                { id:'analysis', label:'N-Protocol 효과', icon:'🪜' },
                { id:'students', label:'개별 학생 (성장 이음 리포트)', icon:'👥' },
                { id:'export', label:'데이터 추출', icon:'⬇️' },
              ].map(tab => (
                <button
                  key={tab.id}
                  onClick={() => { setDashboardTab(tab.id); setSelectedStudent(null); }}
                  className={`flex-1 min-w-[120px] text-xs font-bold px-3 py-2.5 rounded-lg transition-all ${dashboardTab === tab.id ? 'bg-slate-900 text-white shadow' : 'text-slate-600 hover:bg-slate-50'}`}
                >
                  <span className="mr-1">{tab.icon}</span>{tab.label}
                </button>
              ))}
            </div>

            {/* === 탭 1: 반 전체 진도 (히트맵) === */}
            {dashboardTab === 'overview' && (
              <div className="space-y-4">
                <div className="bg-white border border-slate-200 rounded-2xl p-5">
                  <div className="flex items-center justify-between mb-2 flex-wrap gap-2">
                    <h3 className="text-base font-bold text-slate-900">반 진도 히트맵</h3>
                    <div className="flex items-center gap-3 text-xs">
                      <div className="flex items-center gap-1.5" title="자기 점검 퀴즈 모든 문항 정답"><div className="w-3 h-3 rounded bg-emerald-500"></div><span className="text-slate-600">통과 <span className="text-slate-400">(퀴즈 만점)</span></span></div>
                      <div className="flex items-center gap-1.5" title="차시는 열어봤지만 퀴즈 미통과"><div className="w-3 h-3 rounded bg-amber-500"></div><span className="text-slate-600">도전중 <span className="text-slate-400">(퀴즈 미통과)</span></span></div>
                      <div className="flex items-center gap-1.5" title="아직 차시에 진입하지 않음"><div className="w-3 h-3 rounded bg-slate-200"></div><span className="text-slate-600">시작전</span></div>
                    </div>
                  </div>
                  <p className="text-[11px] text-slate-500 mb-4">💡 <strong>통과 기준</strong>: 차시별 자기 점검 퀴즈(차시당 1~2문항)를 <strong className="text-emerald-700">모두 맞히면 통과</strong>로 표시됩니다. 한 문제라도 틀리면 <strong className="text-amber-700">도전중</strong> 상태로 남아 N-Protocol 디딤 진단의 대상이 됩니다.</p>
                  <div className="overflow-x-auto">
                    <table className="w-full text-xs">
                      <thead>
                        <tr>
                          <th className="text-left text-slate-500 font-medium pb-2 pr-2 sticky left-0 bg-white">학생</th>
                          {lessonOrder.map(lid => {
                            const lesson = lessonByIdMap[lid];
                            return <th key={lid} className="text-center text-slate-500 font-medium pb-2 px-1 text-[10px]" title={lesson?.title}>{lesson?.number}</th>;
                          })}
                          <th className="text-center text-slate-500 font-medium pb-2 px-2 text-[10px]">진도</th>
                          <th className="text-center text-slate-500 font-medium pb-2 px-2 text-[10px]">GMS</th>
                        </tr>
                      </thead>
                      <tbody>
                        {studentRoster.map(stu => {
                          const prog = studentProgressData[stu.id];
                          const passed = Object.values(prog).filter(v=>v==='pass').length;
                          const progPct = Math.round((passed/totalLessons)*100);
                          const gms = gmsHistory[stu.id];
                          const latestGMS = gms[gms.length-1].score;
                          return (
                            <tr key={stu.id} className="hover:bg-slate-50 cursor-pointer" onClick={() => { setDashboardTab('students'); setSelectedStudent(stu.id); }}>
                              <td className="py-1.5 pr-2 sticky left-0 bg-white hover:bg-slate-50">
                                <div className="flex items-center gap-1.5">
                                  <span className="text-base">{stu.avatar}</span>
                                  <span className="font-medium text-slate-800">{stu.name}</span>
                                </div>
                              </td>
                              {lessonOrder.map(lid => {
                                const status = prog[lid];
                                return (
                                  <td key={lid} className="text-center px-0.5">
                                    <div className="w-full h-7 rounded" style={{ backgroundColor: statusColor(status) }} title={`${lessonByIdMap[lid]?.title}: ${statusLabel(status)}`}></div>
                                  </td>
                                );
                              })}
                              <td className="text-center px-2 font-bold text-slate-700">{progPct}%</td>
                              <td className="text-center px-2 font-bold" style={{ color: latestGMS>=80?'#10b981':latestGMS>=60?'#f59e0b':'#ef4444' }}>{latestGMS}</td>
                            </tr>

                        <div key={lid} className="flex items-center gap-3">

                            <div className="flex items-center justify-between mb-1">
                              <span className="text-xs font-medium text-slate-700">{lesson?.number} {lesson?.title}</span>
                              <span className="text-xs font-bold text-rose-600">{count}회 막힘</span>
                            </div>
                            <div className="bg-slate-100 rounded-full h-1.5 overflow-hidden">
                              <div className="bg-rose-400 h-full rounded-full" style={{ width: `${widthPct}%` }}></div>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            )}

            {/* === 탭 2: N-Protocol 효과 분석 === */}
            {dashboardTab === 'analysis' && (
              <div className="space-y-4">
                <div className="bg-gradient-to-br from-indigo-50 to-purple-50 border border-indigo-100 rounded-2xl p-5">

                  <p className="text-xs text-indigo-700 mb-4">학생이 어느 단계로 돌아갔을 때 원래 차시를 다시 통과했는가? (N-Protocol 검증 핵심 지표)</p>
                  <div className="grid grid-cols-4 gap-3">
                    {[1,2,3,4].map(tier => {
                      const e = fallbackEffectiveness['tier'+tier];
                      const rate = e.used ? Math.round((e.success/e.used)*100) : 0;
                      const colors = ['emerald','amber','orange','rose'];
                      const labels = ['직전 차시','단원 내 더 앞','다른 단원','이전 학년'];
                      const c = colors[tier-1];
                      return (
                        <div key={tier} className="bg-white rounded-xl p-4 text-center">
                          <div className={`w-10 h-10 mx-auto rounded-full bg-${c}-500 text-white font-black flex items-center justify-center text-lg mb-2`}>{tier}</div>
                          <p className="text-[10px] text-slate-500 font-semibold mb-1">{labels[tier-1]}</p>
                          <p className="text-2xl font-black text-slate-900">{rate}%</p>
                          <p className="text-[10px] text-slate-500 mt-1">{e.success}/{e.used}회 효과</p>
                        </div>
                      );
                    })}
                  </div>

                    <p className="font-semibold mb-1">📊 해석:</p>
                    <p className="text-[11px] text-slate-600 leading-relaxed">전체 디딤 사용 {totalFallbacks}회 중 {fallbackSuccess}회가 원래 차시 재통과로 이어졌어요 ({fallbackSuccessRate}%). 가장 효과가 큰 단계는 디딤이 깊을수록 학생이 핵심 결손을 짚었다는 의미입니다.</p>
                  </div>
                </div>

                {/* 최근 디딤 이동 기록 */}
                <div className="bg-white border border-slate-200 rounded-2xl p-5">
                  <h3 className="text-base font-bold text-slate-900 mb-3">📋 최근 디딤 이동 기록 ({fallbackMoves.length}건)</h3>
                  <div className="overflow-x-auto">
                    <table className="w-full text-xs">
                      <thead>
                        <tr className="border-b border-slate-200">
                          <th className="text-left text-slate-500 font-medium pb-2 px-2">시간</th>
                          <th className="text-left text-slate-500 font-medium pb-2 px-2">학생</th>
                          <th className="text-left text-slate-500 font-medium pb-2 px-2">출발</th>
                          <th className="text-left text-slate-500 font-medium pb-2 px-2">도착</th>
                          <th className="text-center text-slate-500 font-medium pb-2 px-2">단계</th>
                          <th className="text-center text-slate-500 font-medium pb-2 px-2">효과</th>
                        </tr>
                      </thead>
                      <tbody>
                        {fallbackMoves.slice().reverse().map(m => {
                          const stu = studentRoster.find(s=>s.id===m.studentId);
                          const fromName = lessonByIdMap[m.fromLesson]?.number || m.fromLesson;
                          const toName = lessonByIdMap[m.toLesson]?.number || m.toLesson;
                          const tierColor = m.tier===1?'emerald':m.tier===2?'amber':m.tier===3?'orange':'rose';
                          return (
                            <tr key={m.id} className="border-b border-slate-100">
                              <td className="py-2 px-2 text-slate-600">{m.date.slice(5)} {m.time}</td>
                              <td className="py-2 px-2"><span className="font-medium text-slate-800">{stu?.avatar} {stu?.name}</span></td>
                              <td className="py-2 px-2 text-slate-700">{fromName}</td>
                              <td className="py-2 px-2 text-slate-700">{toName}</td>
                              <td className="py-2 px-2 text-center"><span className={`bg-${tierColor}-100 text-${tierColor}-700 font-bold px-2 py-0.5 rounded text-[10px]`}>{m.tier}단계</span></td>
                              <td className="py-2 px-2 text-center text-[10px] font-semibold" style={{ color: m.originPassedAfter===true?'#10b981':m.originPassedAfter===false?'#ef4444':'#94a3b8' }}>
                                {m.originPassedAfter===true?'✓ 통과':m.originPassedAfter===false?'× 미통과':'미정'}

                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}

            {/* === 탭 3: 개별 학생 (성장 이음 리포트) === */}
            {dashboardTab === 'students' && (
              <div className="space-y-4">
                {selectedStudent ? renderStudentDetail(selectedStudent) : (
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                    {studentRoster.map(stu => {
                      const prog = studentProgressData[stu.id];
                      const passed = Object.values(prog).filter(v=>v==='pass').length;
                      const progPct = Math.round((passed/totalLessons)*100);
                      const gms = gmsHistory[stu.id];
                      const latestGMS = gms[gms.length-1].score;
                      const delta = gms[gms.length-1].score - gms[0].score;
                      const quiz = quizSummary[stu.id];
                      const stuFB = fallbackMoves.filter(m=>m.studentId===stu.id);
                      return (
                        <button key={stu.id} onClick={() => setSelectedStudent(stu.id)} className="bg-white border border-slate-200 hover:border-indigo-400 hover:shadow-md rounded-2xl p-4 text-left transition-all">

                            <div className="w-12 h-12 rounded-full bg-gradient-to-br from-indigo-50 to-purple-50 flex items-center justify-center text-2xl">{stu.avatar}</div>
                            <div className="flex-1 min-w-0">
                              <p className="text-sm font-bold text-slate-900">{stu.name}</p>
                              <p className="text-[10px] text-slate-500">{stu.id} · {stu.traits}</p>
                            </div>
                          </div>
                          <div className="space-y-1.5 mb-3">
                            <div className="flex items-center justify-between text-[11px]">
                              <span className="text-slate-500">진도</span>
                              <span className="font-bold text-emerald-600">{progPct}%</span>
                            </div>
                            <div className="bg-slate-100 rounded-full h-1.5 overflow-hidden"><div className="bg-emerald-500 h-full" style={{ width: `${progPct}%` }}></div></div>
                            <div className="grid grid-cols-3 gap-1 mt-2 text-center">
                              <div className="bg-indigo-50 rounded-lg py-1.5">
                                <p className="text-[9px] text-indigo-700">GMS</p>
                                <p className="text-sm font-black text-indigo-700">{latestGMS}</p>
                                <p className="text-[9px] text-indigo-600">{delta>=0?'+':''}{delta}</p>
                              </div>
                              <div className="bg-amber-50 rounded-lg py-1.5">
                                <p className="text-[9px] text-amber-700">퀴즈</p>
                                <p className="text-sm font-black text-amber-700">{quiz.rate}%</p>
                              </div>
                              <div className="bg-rose-50 rounded-lg py-1.5">
                                <p className="text-[9px] text-rose-700">디딤</p>
                                <p className="text-sm font-black text-rose-700">{stuFB.length}</p>
                              </div>
                            </div>
                          </div>
                          <p className="text-[10px] text-indigo-600 font-semibold text-right">상세 리포트 →</p>
                        </button>
                      );
                    })}
                  </div>
                )}
              </div>
            )}

            {/* === 탭 4: 데이터 추출 === */}
            {dashboardTab === 'export' && (
              <div className="space-y-4">
                <div className="bg-gradient-to-br from-slate-900 to-slate-700 text-white rounded-2xl p-5">

                  <p className="text-xs text-slate-300">학급 학습 데이터를 분석·연구·보고 용도로 내보냅니다.</p>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                  {/* CSV */}
                  <div className="bg-white border-2 border-emerald-200 rounded-2xl p-5">
                    <div className="flex items-center gap-2 mb-2">
                      <div className="w-10 h-10 rounded-lg bg-emerald-100 flex items-center justify-center text-xl">📊</div>
                      <div>
                        <p className="text-sm font-bold text-slate-900">CSV 파일</p>
                        <p className="text-[10px] text-slate-500">엑셀에서 바로 열기</p>
                      </div>
                    </div>
                    <p className="text-xs text-slate-600 mb-3 leading-relaxed">학생별 진도·GMS·퀴즈·디딤 데이터를 표 형식으로 추출. 엑셀·구글 시트에서 통계 처리 가능.</p>
                    <ul className="text-[10px] text-slate-500 space-y-0.5 mb-3 pl-3 list-disc">
                      <li>학생별 요약 (5명)</li>
                      <li>디딤 이동 기록 ({fallbackMoves.length}건)</li>
                      <li>UTF-8 BOM 포함 (한글 깨짐 방지)</li>
                    </ul>
                    <button onClick={downloadCSV} className="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-2.5 rounded-lg text-sm">CSV 다운로드</button>
                  </div>

                  {/* JSON */}
                  <div className="bg-white border-2 border-indigo-200 rounded-2xl p-5">
                    <div className="flex items-center gap-2 mb-2">
                      <div className="w-10 h-10 rounded-lg bg-indigo-100 flex items-center justify-center text-xl">🔬</div>
                      <div>
                        <p className="text-sm font-bold text-slate-900">JSON 파일</p>
                        <p className="text-[10px] text-slate-500">연구 분석·시스템 연동</p>
                      </div>
                    </div>
                    <p className="text-xs text-slate-600 mb-3 leading-relaxed">반정형 데이터 (학생/차시/시간 계층 구조). Python·R로 통계 분석, 백엔드 마이그레이션 시 활용.</p>
                    <ul className="text-[10px] text-slate-500 space-y-0.5 mb-3 pl-3 list-disc">
                      <li>중첩 객체 구조 (계층 분리)</li>
                      <li>디딤 효과 집계 포함</li>
                      <li>메타데이터 (학교·학기) 포함</li>
                    </ul>
                    <button onClick={downloadJSON} className="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-2.5 rounded-lg text-sm">JSON 다운로드</button>
                  </div>

                  {/* PDF */}
                  <div className="bg-white border-2 border-rose-200 rounded-2xl p-5">
                    <div className="flex items-center gap-2 mb-2">
                      <div className="w-10 h-10 rounded-lg bg-rose-100 flex items-center justify-center text-xl">📄</div>
                      <div>
                        <p className="text-sm font-bold text-slate-900">PDF 인쇄</p>
                        <p className="text-[10px] text-slate-500">학부모·학교 보고용</p>
                      </div>
                    </div>
                    <p className="text-xs text-slate-600 mb-3 leading-relaxed">현재 화면을 PDF로 저장하거나 인쇄. 학부모 상담·교내 보고·연구학교 보고 자료로 활용.</p>
                    <ul className="text-[10px] text-slate-500 space-y-0.5 mb-3 pl-3 list-disc">
                      <li>인쇄 대화상자 → PDF로 저장 선택</li>
                      <li>현재 표시된 화면을 인쇄</li>
                      <li>학생 개별 리포트도 인쇄 가능</li>
                    </ul>
                    <button onClick={downloadPDF} className="w-full bg-rose-500 hover:bg-rose-600 text-white font-bold py-2.5 rounded-lg text-sm">인쇄 / PDF 저장</button>
                  </div>
                </div>

                {/* === 성장 이음 리포트 일괄 출력 === */}
                <div className="bg-white border-2 border-indigo-300 rounded-2xl p-5">
                  <div className="flex items-start gap-3 mb-4">
                    <div className="w-12 h-12 rounded-xl bg-indigo-500 flex items-center justify-center text-2xl flex-shrink-0">📄</div>
                    <div className="flex-1">
                      <h3 className="text-base font-black text-slate-900">성장 이음 리포트 일괄 출력</h3>
                      <p className="text-xs text-slate-600 mt-0.5">개별 학생 상세 리포트를 한 번에 출력합니다. 학부모 상담·학기말 보고용 PDF로 저장하세요.</p>
                    </div>
                  </div>

                  {/* 학생 선택 */}
                  <div className="bg-slate-50 rounded-xl p-3 mb-3">
                    <div className="flex items-center justify-between mb-2 flex-wrap gap-2">
                      <p className="text-xs font-bold text-slate-700">📋 출력할 학생 선택 ({reportSelection.length}/{studentRoster.length})</p>
                      <div className="flex gap-1.5">
                        <button
                          onClick={() => setReportSelection(studentRoster.map(s => s.id))}
                          className="text-[10px] bg-white border border-slate-200 hover:bg-slate-100 text-slate-700 font-medium px-2.5 py-1 rounded"
                        >전체 선택</button>
                        <button
                          onClick={() => setReportSelection([])}
                          className="text-[10px] bg-white border border-slate-200 hover:bg-slate-100 text-slate-700 font-medium px-2.5 py-1 rounded"
                        >선택 해제</button>
                      </div>
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-2">
                      {studentRoster.map(stu => {
                        const isSelected = reportSelection.includes(stu.id);
                        return (
                          <label
                            key={stu.id}
                            className={`flex items-center gap-2 px-2.5 py-2 rounded-lg cursor-pointer transition-all border-2 ${isSelected ? 'bg-indigo-50 border-indigo-400' : 'bg-white border-slate-200 hover:border-slate-300'}`}
                          >
                            <input
                              type="checkbox"
                              checked={isSelected}
                              onChange={(e) => {
                                if (e.target.checked) setReportSelection([...reportSelection, stu.id]);
                                else setReportSelection(reportSelection.filter(id => id !== stu.id));
                              }}
                              className="w-4 h-4 accent-indigo-500"
                            />
                            <span className="text-lg">{stu.avatar}</span>
                            <div className="flex-1 min-w-0">
                              <p className="text-xs font-bold text-slate-800 truncate">{stu.name}</p>
                              <p className="text-[9px] text-slate-500">{stu.id} · {stu.traits}</p>
                            </div>
                          </label>
                        );
                      })}
                    </div>
                  </div>

                  {/* 출력 버튼들 */}
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                    <button
                      onClick={() => printStudentReports(studentRoster.map(s => s.id))}
                      className="bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-3 rounded-lg text-sm flex items-center justify-center gap-2 transition-colors"
                    >
                      📑 전체 학생 일괄 출력 ({studentRoster.length}명)
                    </button>
                    <button
                      onClick={() => {
                        if (reportSelection.length === 0) {
                          alert('출력할 학생을 1명 이상 선택하세요.');
                          return;
                        }
                        printStudentReports(reportSelection);
                      }}
                      disabled={reportSelection.length === 0}
                      className={`font-bold py-3 rounded-lg text-sm flex items-center justify-center gap-2 transition-colors ${reportSelection.length === 0 ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-emerald-500 hover:bg-emerald-600 text-white'}`}
                    >
                      ✓ 선택 학생만 출력 ({reportSelection.length}명)
                    </button>
                  </div>

                  <div className="bg-blue-50 border border-blue-200 rounded-lg p-3 mt-3">
                    <p className="text-[11px] text-blue-900 font-semibold mb-1">💡 인쇄 다이얼로그 안내</p>
                    <ul className="text-[10px] text-blue-800 space-y-0.5 pl-3 list-disc leading-relaxed">
                      <li>인쇄 대화상자가 열리면 <strong>대상을 'PDF로 저장'</strong>으로 선택하면 PDF 파일로 저장됩니다.</li>
                      <li>각 학생당 A4 1~2장 분량의 리포트가 자동으로 페이지가 구분되어 출력됩니다.</li>
                      <li>리포트에는 진도율·GMS·디딤 이동 기록·종합 의견이 포함됩니다.</li>
                    </ul>
                  </div>
                </div>

                {/* 데이터 구조 안내 */}
                <div className="bg-amber-50 border border-amber-200 rounded-2xl p-4">
                  <p className="text-xs font-bold text-amber-900 mb-2">🔬 연구 분석 안내</p>
                  <ul className="text-[11px] text-amber-800 space-y-1 pl-4 list-disc leading-relaxed">
                    <li><strong>N-Protocol 효과 검증</strong>: 디딤 이동 후 원차시 통과 여부로 측정 (fallbackEffectiveness 항목)</li>
                    <li><strong>GMS 추이 분석</strong>: 주차별 점수 변화로 성장 모멘텀 측정</li>
                    <li><strong>인과 추론</strong>: 디딤 사용 그룹 vs 미사용 그룹의 통과율 비교 (향후 백엔드 도입 후 가능)</li>
                    <li><strong>익명화</strong>: 학생 이름은 S01~S05 코드로 매핑되어 있어 연구용 익명 처리 시 활용</li>
                  </ul>
                </div>
              </div>
            )}

            <div className="bg-slate-50 border border-slate-200 rounded-xl p-4">
              <p className="text-[11px] text-slate-600 leading-relaxed"><span className="font-semibold">시연 안내:</span> 가상 학생 5명의 학습 데이터를 기반으로 한 대시보드 시연입니다. 실제 백엔드 연동 후에는 HiLearning 로그·퀴즈 결과·디딤 이동 등이 실시간으로 반영됩니다.</p>
            </div>
          </div>
        );
      };

// 로그인 안 됐으면 로그인 화면
      if (!studentId) {
        return <LoginScreen onLogin={setStudentId} />;
      }

      // 로그아웃 핸들러
      const handleLogout = () => {
        setStudentId(null);
        setProgress({});
        setView('home');
        setCurrentLesson(null);
        setMode('student');
      };
      return (
        <div className="min-h-screen bg-slate-50">
          <div className="bg-white border-b border-slate-200 sticky top-0 z-30">
            <div className="max-w-6xl mx-auto px-5 py-3 flex items-center justify-between">
            <div className="flex items-center gap-2">
                <School className="w-5 h-5 text-slate-700" />
                <span className="text-sm font-bold text-slate-900">능동초 N-Protocol</span>
                {studentId !== 'TEACHER' && (
                  <span className="text-xs bg-slate-100 text-slate-700 px-2 py-0.5 rounded-md font-semibold ml-1">{studentId}</span>
                )}
              </div>
              <div className="flex items-center gap-2">
                <div className="flex items-center gap-1 bg-slate-100 rounded-lg p-1">
                  <button onClick={() => setMode('student')} className={`text-xs font-semibold px-3 py-1.5 rounded-md transition-colors ${mode === 'student' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-600 hover:text-slate-900'}`}>학생용</button>
                  <button onClick={() => setMode('teacher')} className={`text-xs font-semibold px-3 py-1.5 rounded-md transition-colors ${mode === 'teacher' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-600 hover:text-slate-900'}`}>교사용</button>
                </div>
                <button onClick={handleLogout} className="inline-flex items-center gap-1.5 text-xs text-slate-600 hover:text-slate-900 transition-colors px-2 py-1 rounded-md hover:bg-slate-100">
                  <LogOut className="w-3.5 h-3.5" />로그아웃
                </button>
              </div>
            </div>
          </div>

          {mode === 'student' ? (
            <div className="max-w-2xl mx-auto px-5 py-8 sm:py-10 pb-32">
              {view === 'home' && renderHome()}
              {view === 'prerequisite' && renderPrerequisite()}
              {view === 'lesson' && renderLesson()}
            </div>
          ) : (
            <div className="max-w-6xl mx-auto px-5 py-8">{renderTeacherDashboard()}</div>
          )}

          {mode === 'student' && renderCallButton()}
          {mode === 'student' && renderCallModal()}
          {mode === 'student' && showQuiz && currentLesson && (
            <QuizModal 
              lesson={currentLesson} 
              onClose={() => setShowQuiz(false)}
              onComplete={handleQuizComplete}
            />
          )}

          {/* 인쇄용 영역 (화면에는 안 보이고 인쇄 시에만 표시) */}
          {renderPrintableReports()}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<NProtocol />);
  </script>
</body>
</html>
